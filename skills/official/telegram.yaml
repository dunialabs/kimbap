name: telegram
version: 1.0.0
description: Telegram Bot API integration for sending messages and bot chat operations
base_url: https://api.telegram.org
auth:
  type: none
triggers:
  task_verbs: [send, fetch, list, delete]
  objects: [messages, chats, updates]
  instead_of:
    - sending Telegram Bot API requests directly with embedded bot tokens
  exclusions:
    - non-Telegram messaging systems
gotchas:
  - symptom: 401/404 style failures on every Telegram method
    likely_cause: bot_token is missing, malformed, or belongs to a different bot
    recovery: Supply a valid bot_token for each action or use a preconfigured runtime default
    severity: high
  - symptom: Access denied or chat not found when sending messages
    likely_cause: Bot has not started the chat or lacks permission in the target chat/channel
    recovery: Ensure the bot is added/started in the chat and verify canonical chat_id
    severity: high
  - symptom: Duplicate updates returned from get-updates polling
    likely_cause: offset was not advanced past the highest processed update_id
    recovery: Persist max update_id and call get-updates with offset set to update_id + 1
    severity: medium
  - symptom: Secret material appears in logs or traces
    likely_cause: Telegram token is path-embedded (/bot{bot_token}/...) and passed as action input
    recovery: Treat bot_token as sensitive vault-sourced input and avoid plaintext logging
    severity: critical
recipes:
  - name: Reliable outbound alerting
    description: Send a bot alert with formatting while minimizing delivery surprises
    steps:
      - Resolve target chat_id and ensure the bot can post in that chat
      - Call send-message with bot_token, text, and optional parse_mode
      - Confirm delivery and retry only on transient failures/timeouts
  - name: Poll updates without duplicates
    description: Consume Telegram updates incrementally in a stateless-friendly loop
    steps:
      - Call get-updates with bot_token and current offset checkpoint
      - Process returned updates in order and track highest update_id
      - Persist next offset as highest update_id plus one before the next poll
actions:
  send-message:
    method: POST
    path: /bot{bot_token}/sendMessage
    description: Send a text message to a Telegram chat
    args:
      - name: bot_token
        type: string
        required: true
      - name: chat_id
        type: string
        required: true
      - name: text
        type: string
        required: true
      - name: parse_mode
        type: string
        required: false
      - name: disable_notification
        type: boolean
        required: false
    request:
      body:
        chat_id: "{chat_id}"
        text: "{text}"
        parse_mode: "{parse_mode}"
        disable_notification: "{disable_notification}"
    response:
      type: object
    risk:
      level: medium
  get-updates:
    method: GET
    path: /bot{bot_token}/getUpdates
    description: Poll incoming updates for the bot
    args:
      - name: bot_token
        type: string
        required: true
      - name: offset
        type: integer
        required: false
      - name: limit
        type: integer
        required: false
        default: 100
      - name: timeout
        type: integer
        required: false
    request:
      query:
        offset: "{offset}"
        limit: "{limit}"
        timeout: "{timeout}"
    response:
      type: object
    risk:
      level: low
  get-chat:
    method: GET
    path: /bot{bot_token}/getChat
    description: Get metadata for a Telegram chat
    args:
      - name: bot_token
        type: string
        required: true
      - name: chat_id
        type: string
        required: true
    request:
      query:
        chat_id: "{chat_id}"
    response:
      type: object
    risk:
      level: low
  delete-message:
    method: POST
    path: /bot{bot_token}/deleteMessage
    description: Delete a message sent in a Telegram chat
    warnings:
      - Telegram enforces permission and age limits for message deletion
    args:
      - name: bot_token
        type: string
        required: true
      - name: chat_id
        type: string
        required: true
      - name: message_id
        type: integer
        required: true
    request:
      body:
        chat_id: "{chat_id}"
        message_id: "{message_id}"
    response:
      type: object
    risk:
      level: high
