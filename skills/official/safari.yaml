name: safari
version: 1.0.0
description: Safari browser automation via AppleScript
adapter: applescript
target_app: Safari
auth:
  type: none
triggers:
  task_verbs: [open, inspect, list, capture, close, navigate]
  objects: [urls, tabs, windows, page source]
  instead_of:
    - manually switching tabs to collect URLs or source snippets
  exclusions:
    - authenticated browser automation requiring form filling or multi-step UI interaction
gotchas:
  - symptom: get-url or get-source fails with "no front document" errors
    likely_cause: Safari has no open window/tab or is still launching
    recovery: Ensure at least one tab exists (open-url if needed) and retry after Safari is ready
    severity: common
  - symptom: close-tab closes the wrong tab
    likely_cause: Tab indices shift as tabs are opened/closed and are not stable identifiers
    recovery: Run safari.list-tabs immediately before close-tab and use current window/tab indexes
    severity: high
  - symptom: get-source returns partial/old HTML
    likely_cause: Page is still loading or dynamically mutates after initial load
    recovery: Wait briefly for load completion and retry source capture
    severity: medium
recipes:
  - name: Deterministic tab closure workflow
    description: Avoid index drift by resolving tabs just-in-time
    steps:
      - Run safari.list-tabs to identify current window_index and tab_index for the target
      - Optionally run safari.get-url to confirm tab identity
      - Run safari.close-tab with the validated indexes
actions:
  get-url:
    command: safari-get-url
    description: Get URL and title of the current tab
    idempotent: true
    args: []
    response:
      type: object
    risk:
      level: low
  open-url:
    command: safari-open-url
    description: Open a URL in Safari
    idempotent: false
    args:
      - name: url
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  list-tabs:
    command: safari-list-tabs
    description: List open tabs across all Safari windows
    idempotent: true
    args: []
    response:
      type: array
    risk:
      level: low
  close-tab:
    command: safari-close-tab
    description: Close a tab by window and tab index
    idempotent: false
    args:
      - name: window_index
        type: integer
        required: true
      - name: tab_index
        type: integer
        required: true
    response:
      type: object
    risk:
      level: medium
  get-source:
    command: safari-get-source
    description: Get current tab page source HTML
    idempotent: true
    args: []
    response:
      type: object
    risk:
      level: low
