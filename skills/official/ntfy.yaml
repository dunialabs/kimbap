name: ntfy
version: 1.0.0
description: ntfy push notification service for sending notifications to devices
base_url: https://ntfy.sh
auth:
  type: none
triggers:
  task_verbs: [send, publish, notify, push]
  objects: [notifications, alerts, messages]
  instead_of:
    - calling ntfy APIs directly with unmanaged public topics
  exclusions:
    - unrelated actions outside topic-based push notifications
gotchas:
  - symptom: Unexpected users can read or post to topic
    likely_cause: Topic names are public/discoverable unless separately protected
    recovery: Use non-guessable topic names and configure authentication when required
    severity: high
  - symptom: Alert urgency appears inverted in clients
    likely_cause: Priority scale misunderstood (5 highest, 1 lowest, 3 default)
    recovery: Map severity to correct ntfy priority values before sending
    severity: common
  - symptom: Long notification text appears truncated
    likely_cause: Message exceeds service payload limits
    recovery: Keep messages under 4096 bytes or split across multiple notifications
    severity: medium
  - symptom: Tags do not render as expected
    likely_cause: Unknown emoji shortcodes are ignored
    recovery: Use supported tag shortcodes like warning or white_check_mark
    severity: low
recipes:
  - name: Priority alert publish
    description: Send an actionable alert with title, body, and urgency metadata
    steps:
      - Choose a secure topic and compose a concise alert message
      - Publish with title and mapped priority value
      - Add supported tags to improve visual scanning in clients
actions:
  publish:
    method: POST
    path: /{topic}
    description: Send a push notification to a topic
    args:
      - name: topic
        type: string
        required: true
      - name: message
        type: string
        required: true
      - name: title
        type: string
        required: false
      - name: priority
        type: integer
        required: false
        default: 3
      - name: tags
        type: array
        required: false
    request:
      path_params:
        topic: "{topic}"
      body:
        topic: "{topic}"
        message: "{message}"
        title: "{title}"
        priority: "{priority}"
        tags: "{tags}"
    response:
      type: object
    risk:
      level: medium
