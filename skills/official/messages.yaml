name: messages
version: 1.0.0
description: Apple Messages automation via AppleScript
adapter: applescript
target_app: Messages
auth:
  type: none
actions:
  send:
    command: messages-send
    description: Send a message to a phone number or email handle
    idempotent: false
    args:
      - name: to
        type: string
        required: true
      - name: body
        type: string
        required: true
    response:
      type: object
    risk:
      level: high
  list-chats:
    command: messages-list-chats
    description: List recent chats and participants
    idempotent: true
    args:
      - name: limit
        type: integer
        required: false
    response:
      type: array
    risk:
      level: low
