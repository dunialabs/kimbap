name: ms-excel
version: 1.0.0
description: Microsoft Excel automation via AppleScript — workbook and cell operations on macOS
adapter: applescript
target_app: Microsoft Excel
auth:
  type: none
triggers:
  task_verbs: [create, open, read, write, calculate, export]
  objects: [workbooks, sheets, cells, ranges]
  instead_of:
    - manually updating individual Excel cells/ranges for routine operations
  exclusions:
    - complex macro/VBA authoring or pivot model design tasks
gotchas:
  - symptom: read-cell/write-cell targets wrong sheet
    likely_cause: sheet argument omitted while a different worksheet is active
    recovery: Pass sheet explicitly for all cell/range operations in multi-sheet workbooks
    severity: high
  - symptom: write-cell appears successful but displays unexpected value format
    likely_cause: Excel auto-converts strings to date/number/scientific formats based on cell formatting
    recovery: Validate cell number format and read back value after write to confirm intended representation
    severity: medium
  - symptom: save-as-pdf fails or exports stale workbook state
    likely_cause: Workbook is in edit/dirty state or output path is invalid/unwritable
    recovery: Ensure edits are committed, then export using an absolute writable output_path
    severity: common
recipes:
  - name: Reliable cell update loop
    description: Perform explicit sheet-scoped updates with read-after-write checks
    steps:
      - Run ms-excel.open-workbook for the target workbook
      - Run ms-excel.write-cell with cell, value, and explicit sheet
      - Run ms-excel.read-cell (or read-range) on the same sheet to verify persisted result
actions:
  create-workbook:
    command: excel-create-workbook
    description: Create a new blank Excel workbook
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  open-workbook:
    command: excel-open-workbook
    description: Open an Excel workbook from a POSIX file path
    idempotent: false
    args:
      - name: path
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  read-cell:
    command: excel-read-cell
    description: Read the value of a single cell in the active workbook
    idempotent: true
    args:
      - name: cell
        type: string
        required: true
      - name: sheet
        type: string
        required: false
    response:
      type: object
    risk:
      level: low
  write-cell:
    command: excel-write-cell
    description: Write a value to a single cell in the active workbook
    idempotent: false
    args:
      - name: cell
        type: string
        required: true
      - name: value
        type: string
        required: true
      - name: sheet
        type: string
        required: false
    response:
      type: object
    risk:
      level: medium
  read-range:
    command: excel-read-range
    description: Read values from a cell range in the active workbook
    idempotent: true
    args:
      - name: range
        type: string
        required: true
      - name: sheet
        type: string
        required: false
    response:
      type: object
    risk:
      level: low
  save-as-pdf:
    command: excel-save-as-pdf
    description: Export the active workbook as a PDF file
    idempotent: false
    args:
      - name: output_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  close-workbook:
    command: excel-close-workbook
    description: Close the active workbook
    idempotent: false
    args:
      - name: save
        type: boolean
        required: false
        default: false
    response:
      type: object
    risk:
      level: medium
