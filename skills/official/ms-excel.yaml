name: ms-excel
version: 1.0.0
description: Microsoft Excel automation via AppleScript — workbook and cell operations on macOS
adapter: applescript
target_app: Microsoft Excel
auth:
  type: none
actions:
  create-workbook:
    command: excel-create-workbook
    description: Create a new blank Excel workbook
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  open-workbook:
    command: excel-open-workbook
    description: Open an Excel workbook from a POSIX file path
    idempotent: false
    args:
      - name: path
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  read-cell:
    command: excel-read-cell
    description: Read the value of a single cell in the active workbook
    idempotent: true
    args:
      - name: cell
        type: string
        required: true
      - name: sheet
        type: string
        required: false
    response:
      type: object
    risk:
      level: low
  write-cell:
    command: excel-write-cell
    description: Write a value to a single cell in the active workbook
    idempotent: false
    args:
      - name: cell
        type: string
        required: true
      - name: value
        type: string
        required: true
      - name: sheet
        type: string
        required: false
    response:
      type: object
    risk:
      level: medium
  read-range:
    command: excel-read-range
    description: Read values from a cell range in the active workbook
    idempotent: true
    args:
      - name: range
        type: string
        required: true
      - name: sheet
        type: string
        required: false
    response:
      type: object
    risk:
      level: low
  save-as-pdf:
    command: excel-save-as-pdf
    description: Export the active workbook as a PDF file
    idempotent: false
    args:
      - name: output_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  close-workbook:
    command: excel-close-workbook
    description: Close the active workbook
    idempotent: false
    args:
      - name: save
        type: boolean
        required: false
        default: false
    response:
      type: object
    risk:
      level: medium
