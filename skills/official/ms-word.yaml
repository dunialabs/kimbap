name: ms-word
version: 1.0.0
description: Microsoft Word automation via AppleScript — document creation, editing, and export on macOS
adapter: applescript
target_app: Microsoft Word
auth:
  type: none
actions:
  create-document:
    command: word-create-document
    description: Create a new blank Word document
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  open-document:
    command: word-open-document
    description: Open a Word document from a POSIX file path
    idempotent: false
    args:
      - name: path
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  get-text:
    command: word-get-text
    description: Get the full text content of the active document
    idempotent: true
    args: []
    response:
      type: object
    risk:
      level: low
  set-text:
    command: word-set-text
    description: Replace the full text content of the active document
    idempotent: false
    args:
      - name: text
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  find-replace:
    command: word-find-replace
    description: Find and replace text in the active document
    idempotent: false
    args:
      - name: find
        type: string
        required: true
      - name: replace
        type: string
        required: true
      - name: match_case
        type: boolean
        required: false
        default: false
    response:
      type: object
    risk:
      level: medium
  save-as-pdf:
    command: word-save-as-pdf
    description: Export the active document as a PDF file
    idempotent: false
    args:
      - name: output_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  close-document:
    command: word-close-document
    description: Close the active document
    idempotent: false
    args:
      - name: save
        type: boolean
        required: false
        default: false
    response:
      type: object
    risk:
      level: medium
