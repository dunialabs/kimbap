name: ms-word
version: 1.0.0
description: Microsoft Word automation via AppleScript — document creation, editing, and export on macOS
adapter: applescript
target_app: Microsoft Word
auth:
  type: none
triggers:
  task_verbs: [create, open, read, write, replace, export]
  objects: [documents, text, sections, files]
  instead_of:
    - manually performing routine Word text edits and PDF export
  exclusions:
    - tracked-changes review workflows requiring human legal/editorial judgment
gotchas:
  - symptom: set-text replaces the entire document unexpectedly
    likely_cause: Action is document-wide, not selection-scoped
    recovery: Read current content with word-get-text and only call set-text for full-document rewrites
    severity: high
  - symptom: find-replace changes too many occurrences
    likely_cause: match_case defaults to false and replacement runs globally
    recovery: Run targeted find values, enable match_case when needed, and verify results after replacement
    severity: medium
  - symptom: open/save/export fails with file access errors
    likely_cause: Document is locked by sync/client process or output path is invalid
    recovery: Ensure file is not locked, use absolute writable paths, and retry after sync completes
    severity: common
recipes:
  - name: Controlled find-replace with export
    description: Apply broad text updates safely and produce a PDF artifact
    steps:
      - Run ms-word.open-document and ms-word.get-text to confirm target content
      - Run ms-word.find-replace with explicit find/replace and match_case as needed
      - Run ms-word.save-as-pdf with an absolute output_path
actions:
  create-document:
    command: word-create-document
    description: Create a new blank Word document
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  open-document:
    command: word-open-document
    description: Open a Word document from a POSIX file path
    idempotent: false
    args:
      - name: path
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  get-text:
    command: word-get-text
    description: Get the full text content of the active document
    idempotent: true
    args: []
    response:
      type: object
    risk:
      level: low
  set-text:
    command: word-set-text
    description: Replace the full text content of the active document
    idempotent: false
    args:
      - name: text
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  find-replace:
    command: word-find-replace
    description: Find and replace text in the active document
    idempotent: false
    args:
      - name: find
        type: string
        required: true
      - name: replace
        type: string
        required: true
      - name: match_case
        type: boolean
        required: false
        default: false
    response:
      type: object
    risk:
      level: medium
  save-as-pdf:
    command: word-save-as-pdf
    description: Export the active document as a PDF file
    idempotent: false
    args:
      - name: output_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  close-document:
    command: word-close-document
    description: Close the active document
    idempotent: false
    args:
      - name: save
        type: boolean
        required: false
        default: false
    response:
      type: object
    risk:
      level: medium
