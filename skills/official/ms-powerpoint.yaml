name: ms-powerpoint
version: 1.0.0
description: Microsoft PowerPoint automation via AppleScript — presentation creation, slide editing, and export on macOS
adapter: applescript
target_app: Microsoft PowerPoint
auth:
  type: none
triggers:
  task_verbs: [create, open, edit, add, export, close]
  objects: [presentations, slides, shapes, text]
  instead_of:
    - manually building PowerPoint slides or using shell-based conversion tools
  exclusions:
    - complex animation or transition authoring beyond text and shape edits
gotchas:
  - symptom: set-slide-text targets wrong shape or overwrites unintended content
    likely_cause: shape_index defaults to 1 but slide layouts vary in shape ordering
    recovery: Inspect slide shapes first and pass the correct shape_index explicitly
    severity: high
  - symptom: PowerPoint commands fail silently or time out
    likely_cause: Microsoft PowerPoint is not running or a modal dialog blocks AppleScript
    recovery: Ensure PowerPoint is launched and dismiss any open dialogs before retrying
    severity: high
  - symptom: Exported PDF or PNG contains stale or missing slide content
    likely_cause: Edits have not been committed or the wrong presentation is frontmost
    recovery: Verify the correct presentation is active with open-presentation before export
    severity: medium
recipes:
  - name: Build and export a presentation
    description: Create a presentation with slides and export to PDF
    steps:
      - Create a new presentation with create-presentation
      - Add slides with add-slide and set text with set-slide-text
      - Export the final result with save-as-pdf
actions:
  create-presentation:
    command: ppt-create-presentation
    description: Create a new blank PowerPoint presentation
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  open-presentation:
    command: ppt-open-presentation
    description: Open a PowerPoint presentation from a POSIX file path
    idempotent: false
    args:
      - name: path
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  add-slide:
    command: ppt-add-slide
    description: Add a new slide to the active presentation
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  set-slide-text:
    command: ppt-set-slide-text
    description: Set text on a shape in a specific slide
    idempotent: false
    args:
      - name: slide_index
        type: integer
        required: true
      - name: shape_index
        type: integer
        required: false
        default: 1
      - name: text
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  save-as-pdf:
    command: ppt-save-as-pdf
    description: Export the active presentation as a PDF file
    idempotent: false
    args:
      - name: output_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  save-as-png:
    command: ppt-save-as-png
    description: Export the active presentation slides as PNG images
    idempotent: false
    args:
      - name: output_dir
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  close-presentation:
    command: ppt-close-presentation
    description: Close the active presentation
    idempotent: false
    args:
      - name: save
        type: boolean
        required: false
        default: false
    response:
      type: object
    risk:
      level: medium
