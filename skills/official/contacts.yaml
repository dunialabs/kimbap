name: contacts
version: 1.0.0
description: Apple Contacts automation via AppleScript
adapter: applescript
target_app: Contacts
auth:
  type: none
actions:
  list:
    command: contacts-list
    description: List contacts with email and phone fields
    idempotent: true
    args:
      - name: limit
        type: integer
        required: false
    response:
      type: array
    risk:
      level: low
  search:
    command: contacts-search
    description: Search contacts by name or email
    idempotent: true
    args:
      - name: query
        type: string
        required: true
    response:
      type: array
    risk:
      level: low
  get:
    command: contacts-get
    description: Get full contact details by name
    idempotent: true
    args:
      - name: name
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  create:
    command: contacts-create
    description: Create a new contact entry
    idempotent: false
    args:
      - name: first_name
        type: string
        required: true
      - name: last_name
        type: string
        required: false
      - name: email
        type: string
        required: false
      - name: phone
        type: string
        required: false
      - name: organization
        type: string
        required: false
    response:
      type: object
    risk:
      level: medium
