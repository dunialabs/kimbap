name: pages
version: 1.0.0
description: Apple Pages automation via AppleScript — document creation, editing, and export on macOS
adapter: applescript
target_app: Pages
auth:
  type: none
actions:
  create-document:
    command: pages-create-document
    description: Create a new blank Pages document
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  open-document:
    command: pages-open-document
    description: Open a Pages document from a POSIX file path
    idempotent: false
    args:
      - name: path
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  get-text:
    command: pages-get-text
    description: Get the full text content of the active document
    idempotent: true
    args: []
    response:
      type: object
    risk:
      level: low
  set-text:
    command: pages-set-text
    description: Replace the full text content of the active document
    idempotent: false
    args:
      - name: text
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  export-pdf:
    command: pages-export-pdf
    description: Export the active document as a PDF file
    idempotent: false
    args:
      - name: output_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  export-word:
    command: pages-export-word
    description: Export the active document as a Microsoft Word file
    idempotent: false
    args:
      - name: output_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  close-document:
    command: pages-close-document
    description: Close the active document
    idempotent: false
    args:
      - name: save
        type: boolean
        required: false
        default: false
    response:
      type: object
    risk:
      level: medium
