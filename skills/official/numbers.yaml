name: numbers
version: 1.0.0
description: Apple Numbers automation via AppleScript — spreadsheet and cell operations on macOS
adapter: applescript
target_app: Numbers
auth:
  type: none
actions:
  create-spreadsheet:
    command: numbers-create-spreadsheet
    description: Create a new blank Numbers spreadsheet
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  open-spreadsheet:
    command: numbers-open-spreadsheet
    description: Open a Numbers spreadsheet from a POSIX file path
    idempotent: false
    args:
      - name: path
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  read-cell:
    command: numbers-read-cell
    description: Read the value of a single cell in the active spreadsheet
    idempotent: true
    args:
      - name: cell
        type: string
        required: true
      - name: sheet_name
        type: string
        required: false
    response:
      type: object
    risk:
      level: low
  write-cell:
    command: numbers-write-cell
    description: Write a value to a single cell in the active spreadsheet
    idempotent: false
    args:
      - name: cell
        type: string
        required: true
      - name: value
        type: string
        required: true
      - name: sheet_name
        type: string
        required: false
    response:
      type: object
    risk:
      level: medium
  export-pdf:
    command: numbers-export-pdf
    description: Export the active spreadsheet as a PDF file
    idempotent: false
    args:
      - name: output_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  close-spreadsheet:
    command: numbers-close-spreadsheet
    description: Close the active spreadsheet
    idempotent: false
    args:
      - name: save
        type: boolean
        required: false
        default: false
    response:
      type: object
    risk:
      level: medium
