name: ollama
version: 1.0.0
description: Ollama local LLM API for model management and inference
base_url: http://localhost:11434
auth:
  type: none
triggers:
  task_verbs: [list, inspect, pull, generate, chat, embed, delete]
  objects: [models, responses, embeddings]
  instead_of:
    - sending raw Ollama HTTP requests directly
  exclusions:
    - cloud hosted model providers unrelated to local Ollama
gotchas:
  - symptom: generate or chat hangs and never returns
    likely_cause: Ollama stream mode defaults to true for these endpoints
    recovery: Send stream as literal false in request body for single JSON response
    severity: medium
  - symptom: model not found on generate or chat
    likely_cause: Model is not pulled locally or name/tag is incorrect
    recovery: List available tags first, then pull the exact model name if missing
    severity: high
  - symptom: pull-model appears stalled for large models
    likely_cause: First download can take significant time depending on model size
    recovery: Retry with backoff and confirm local disk/network capacity
    severity: common
recipes:
  - name: Pull then generate deterministically
    description: Ensure the model exists locally before running one-shot generation
    steps:
      - List local models and confirm target tag availability
      - Pull missing model with stream disabled for a single completion payload
      - Run generate with stream false and inspect response text fields
  - name: Chat then embed for retrieval workflows
    description: Produce conversational output and embeddings from local models in one flow
    steps:
      - Send structured messages array to chat with stream disabled
      - Embed the finalized user text with the same model family
      - Store returned vectors with source metadata for search
actions:
  list-models:
    method: GET
    path: /api/tags
    description: List locally available Ollama models
    response:
      type: object
    risk:
      level: low

  show-model:
    method: POST
    path: /api/show
    description: Show details for a specific model
    args:
      - name: name
        type: string
        required: true
    request:
      body:
        name: "{name}"
    response:
      type: object
    risk:
      level: low

  pull-model:
    method: POST
    path: /api/pull
    description: Pull a model into the local Ollama runtime
    args:
      - name: name
        type: string
        required: true
    request:
      body:
        name: "{name}"
        stream: false
    response:
      type: object
    risk:
      level: medium

  generate:
    method: POST
    path: /api/generate
    description: Generate text from a prompt using a local model
    args:
      - name: model
        type: string
        required: true
      - name: prompt
        type: string
        required: true
    request:
      body:
        model: "{model}"
        prompt: "{prompt}"
        stream: false
    response:
      type: object
    risk:
      level: medium

  chat:
    method: POST
    path: /api/chat
    description: Chat with a local model using message objects
    args:
      - name: model
        type: string
        required: true
      - name: messages
        type: array
        required: true
    request:
      body:
        model: "{model}"
        messages: "{messages}"
        stream: false
    response:
      type: object
    risk:
      level: medium

  embed:
    method: POST
    path: /api/embed
    description: Generate embeddings from a local model
    args:
      - name: model
        type: string
        required: true
      - name: input
        type: string
        required: true
    request:
      body:
        model: "{model}"
        input: "{input}"
    response:
      type: object
    risk:
      level: low

  delete-model:
    method: DELETE
    path: /api/delete
    description: Permanently delete a local model
    warnings:
      - This action permanently removes the model from local storage
    args:
      - name: name
        type: string
        required: true
    request:
      body:
        name: "{name}"
    response:
      type: object
    risk:
      level: high
