        serverName: "{serverName}"
        functions: "{functions}"
        resources: "{resources}"
        lazyStartEnabled: "{lazyStartEnabled}"
        publicAccess: "{publicAccess}"
        allowUserInput: "{allowUserInput}"
    response:
      type: object
    risk:
      level: high
  create-rest-api-tool:
    method: POST
    path: /tools/rest-api
    description: >
      Create a REST API tool by providing a base URL, optional auth, and a list of API endpoints
