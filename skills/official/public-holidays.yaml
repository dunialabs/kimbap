name: public-holidays
version: 1.0.0
description: Nager.Date API for public holiday information by country
base_url: https://date.nager.at
auth:
  type: none
triggers:
  task_verbs: [check, list, get]
  objects: [holidays, public holidays, bank holidays]
  instead_of:
    - calling public holiday APIs directly with unvalidated country/year params
  exclusions:
    - unrelated actions outside holiday calendar retrieval
gotchas:
  - symptom: get-holidays returns 400/404 for country input
    likely_cause: country_code is not ISO 3166-1 alpha-2
    recovery: Use two-letter country codes such as US, GB, or DE
    severity: common
  - symptom: Path validation fails for year parameter
    likely_cause: year is not a four-digit year string
    recovery: Pass year as a 4-digit value like 2024
    severity: medium
  - symptom: Empty holiday list is interpreted as API failure
    likely_cause: Some country/year combinations legitimately have no registered entries
    recovery: Treat empty arrays as valid no-data responses unless HTTP indicates error
    severity: low
recipes:
  - name: Holiday planner workflow
    description: Resolve a country code then retrieve annual holidays for planning
    steps:
      - List available countries and select the desired country_code
      - Call get-holidays with target year and selected country_code
      - Use returned dates to build scheduling constraints
actions:
  get-holidays:
    method: GET
    path: /api/v3/PublicHolidays/{year}/{country_code}
    description: Get public holidays for a given year and country
    args:
      - name: year
        type: string
        required: true
      - name: country_code
        type: string
        required: true
    request:
      path_params:
        year: "{year}"
        country_code: "{country_code}"
    response:
      type: array
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 200
      retry_on: [429, 500, 502, 503]
  get-next-holidays:
    method: GET
    path: /api/v3/NextPublicHolidays/{country_code}
    description: Get upcoming public holidays for a country
    args:
      - name: country_code
        type: string
        required: true
    request:
      path_params:
        country_code: "{country_code}"
    response:
      type: array
    risk:
      level: low
  list-countries:
    method: GET
    path: /api/v3/AvailableCountries
    description: List all available countries with their codes
    response:
      type: array
    risk:
      level: low
