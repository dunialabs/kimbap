name: finder
version: 1.0.0
description: Finder automation via AppleScript — file system operations on macOS
adapter: applescript
target_app: Finder
auth:
  type: none
triggers:
  task_verbs: [list, move, copy, delete, open, organize]
  objects: [files, folders, directories, items]
  instead_of:
    - using shell mv/cp/rm for GUI-visible file operations
  exclusions:
    - file content reading or editing (use appropriate editors instead)
gotchas:
  - symptom: Operation fails with "file not found" despite correct-looking path
    likely_cause: Path uses ~ or relative format instead of absolute POSIX path
    recovery: Always use full absolute POSIX paths (e.g. /Users/name/Documents/file.txt)
    severity: medium
  - symptom: Move or delete fails silently or targets wrong item
    likely_cause: Duplicate file/folder names in the same directory or ambiguous path
    recovery: Verify exact path with finder.list-items first, then use the full unique path
    severity: high
  - symptom: File operation returns permission error for Desktop/Documents/Downloads
    likely_cause: Finder automation lacks Full Disk Access or Files and Folders permission
    recovery: Grant required macOS privacy permissions to the calling process and retry
    severity: common
recipes:
  - name: Safe file move with preflight verification
    description: Reduce destructive mistakes by validating source and destination first
    steps:
      - Run finder.list-items on the source directory to confirm exact item name/path
      - Run finder.list-items on the destination directory to ensure target exists
      - Run finder.move-item with full absolute source_path and destination_path
actions:
  list-items:
    command: finder-list-items
    description: List files and folders in a directory
    idempotent: true
    args:
      - name: path
        type: string
        required: true
    response:
      type: array
    risk:
      level: low
  get-info:
    command: finder-get-info
    description: Get metadata for a file or folder
    idempotent: true
    args:
      - name: path
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  create-folder:
    command: finder-create-folder
    description: Create a new folder in a target directory
    idempotent: false
    args:
      - name: path
        type: string
        required: true
      - name: name
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  move-item:
    command: finder-move-item
    description: Move a file or folder to another directory
    idempotent: false
    args:
      - name: source_path
        type: string
        required: true
      - name: destination_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: high
  copy-item:
    command: finder-copy-item
    description: Copy a file or folder to another directory
    idempotent: false
    args:
      - name: source_path
        type: string
        required: true
      - name: destination_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  delete-item:
    command: finder-delete-item
    description: Move a file or folder to Trash
    idempotent: false
    args:
      - name: path
        type: string
        required: true
    response:
      type: object
    risk:
      level: high
  open-item:
    command: finder-open-item
    description: Open a file or folder in its default app
    idempotent: false
    args:
      - name: path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
