id: google
display_name: Google
supported_flows: [browser, device]
auth_endpoint: https://accounts.google.com/o/oauth2/v2/auth
token_endpoint: https://oauth2.googleapis.com/token
device_endpoint: https://oauth2.googleapis.com/device/code
revocation_endpoint: https://oauth2.googleapis.com/revoke
user_info_endpoint: https://www.googleapis.com/oauth2/v2/userinfo
default_scopes:
  - openid
  - email
  - profile
scope_presets:
  minimal: "openid email"
  gmail: "openid email https://www.googleapis.com/auth/gmail.readonly"
  drive: "openid email https://www.googleapis.com/auth/drive.readonly"
connection_scope_model: [user]
pkce_required: true
auth_lanes: [byo]
token_exchange:
  auth_method: body
