id: figma
display_name: Figma
supported_flows: [browser]
auth_endpoint: https://www.figma.com/oauth
token_endpoint: https://api.figma.com/v1/oauth/token
user_info_endpoint: https://api.figma.com/v1/me
default_scopes:
  - "files:read"
scope_presets:
  readonly: "files:read"
  readwrite: "files:read,file_variables:read,file_variables:write"
connection_scope_model: [user]
pkce_required: false
auth_lanes: [byo]
token_exchange:
  auth_method: body
