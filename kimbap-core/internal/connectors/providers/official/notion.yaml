id: notion
display_name: Notion
supported_flows: [browser]
auth_endpoint: https://api.notion.com/v1/oauth/authorize
token_endpoint: https://api.notion.com/v1/oauth/token
user_info_endpoint: https://api.notion.com/v1/users/me
default_scopes: []
connection_scope_model: [workspace]
pkce_required: false
notes: "Notion uses workspace-level OAuth. Scopes are defined during OAuth app setup, not at authorization time."
auth_lanes: [managed-confidential, byo]
token_exchange:
  auth_method: basic
