id: stripe
display_name: Stripe
supported_flows: [browser]
auth_endpoint: https://connect.stripe.com/oauth/authorize
token_endpoint: https://connect.stripe.com/oauth/token
revocation_endpoint: https://connect.stripe.com/oauth/deauthorize
default_scopes:
  - read_only
scope_presets:
  readonly: "read_only"
  readwrite: "read_write"
connection_scope_model: [user, workspace]
pkce_required: false
auth_lanes: [managed-confidential, byo]
token_exchange:
  auth_method: basic
