services:
  # NOTE: Postgres is optional. kimbap uses SQLite by default (embedded, no setup required).
  # Use postgres only if you need multi-instance/connected mode with a shared DB.
  postgres:
    image: postgres:16-alpine
    container_name: kimbap-core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kimbap
      POSTGRES_PASSWORD: kimbap123
      POSTGRES_DB: kimbap_db
    ports:
      - '${KIMBAP_POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kimbap -d kimbap_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kimbap-core-network

  kimbap-auth:
    image: dunialabs/kimbap-auth:latest
    container_name: kimbap-auth
    restart: unless-stopped
    ports:
      - '7788:7788'
    networks:
      - kimbap-core-network
    volumes:
      - kimbap-auth-data:/data

volumes:
  postgres_data:
    driver: local
  kimbap-auth-data:
    driver: local

networks:
  kimbap-core-network:
    driver: bridge
