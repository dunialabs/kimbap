name: apple-reminders
version: 1.0.0
description: Apple Reminders via AppleScript
adapter: applescript
target_app: Reminders
auth:
  type: none
actions:
  list-lists:
    command: list-lists
    description: List all reminder lists
    idempotent: true
    args: []
    response:
      type: array
    risk:
      level: low
  list-reminders:
    command: list-reminders
    description: List reminders, optionally filtered by list
    idempotent: true
    args:
      - name: list
        type: string
        required: false
    response:
      type: array
    risk:
      level: low
  get-reminder:
    command: get-reminder
    description: Get reminder details by name
    idempotent: true
    args:
      - name: name
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  create-reminder:
    command: create-reminder
    description: Create a new reminder
    idempotent: false
    args:
      - name: name
        type: string
        required: true
      - name: list
        type: string
        required: false
      - name: due_date
        type: string
        required: false
      - name: priority
        type: string
        required: false
      - name: notes
        type: string
        required: false
    response:
      type: object
    risk:
      level: medium
  complete-reminder:
    command: complete-reminder
    description: Mark a reminder as completed
    idempotent: false
    args:
      - name: name
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
