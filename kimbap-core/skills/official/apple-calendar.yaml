name: apple-calendar
version: 1.0.0
description: Apple Calendar via AppleScript
adapter: applescript
target_app: Calendar
auth:
  type: none
actions:
  list-calendars:
    command: list-calendars
    description: List all calendars
    idempotent: true
    args: []
    response:
      type: array
    risk:
      level: low
  list-events:
    command: list-events
    description: List events, optionally filtered by calendar and date range
    idempotent: true
    args:
      - name: calendar
        type: string
        required: false
      - name: start_date
        type: string
        required: false
      - name: end_date
        type: string
        required: false
    response:
      type: array
    risk:
      level: low
  get-event:
    command: get-event
    description: Get event details by title
    idempotent: true
    args:
      - name: title
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  create-event:
    command: create-event
    description: Create a new calendar event
    idempotent: false
    args:
      - name: title
        type: string
        required: true
      - name: start_date
        type: string
        required: true
      - name: end_date
        type: string
        required: true
      - name: calendar
        type: string
        required: false
      - name: location
        type: string
        required: false
      - name: notes
        type: string
        required: false
    response:
      type: object
    risk:
      level: medium
  search-events:
    command: search-events
    description: Search events by keyword
    idempotent: true
    args:
      - name: query
        type: string
        required: true
    response:
      type: array
    risk:
      level: low
