name: coingecko
version: 1.0.0
description: CoinGecko API for cryptocurrency prices, market data, and trending coins
base_url: https://api.coingecko.com
auth:
  type: none
actions:
  get-price:
    method: GET
    path: /api/v3/simple/price
    description: Get current price of one or more cryptocurrencies
    args:
      - name: ids
        type: string
        required: true
      - name: vs_currencies
        type: string
        required: true
      - name: include_24hr_change
        type: boolean
        required: false
    request:
      query:
        ids: "{ids}"
        vs_currencies: "{vs_currencies}"
        include_24hr_change: "{include_24hr_change}"
    response:
      type: object
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 500
      retry_on: [429]
  get-coin:
    method: GET
    path: /api/v3/coins/{id}
    description: Get detailed information about a specific cryptocurrency
    args:
      - name: id
        type: string
        required: true
    request:
      path_params:
        id: "{id}"
      query:
        localization: "false"
    response:
      type: object
    risk:
      level: low
  list-coins:
    method: GET
    path: /api/v3/coins/list
    description: List all supported coins with id, name, and symbol
    response:
      type: array
    risk:
      level: low
  get-trending:
    method: GET
    path: /api/v3/search/trending
    description: Get trending coins and NFTs on CoinGecko
    response:
      type: object
    risk:
      level: low
  get-market-chart:
    method: GET
    path: /api/v3/coins/{id}/market_chart
    description: Get historical market data for a coin over a time range
    args:
      - name: id
        type: string
        required: true
      - name: vs_currency
        type: string
        required: true
      - name: days
        type: string
        required: true
        enum: ["1", "7", "14", "30", "90", "180", "365", "max"]
    request:
      path_params:
        id: "{id}"
      query:
        vs_currency: "{vs_currency}"
        days: "{days}"
    response:
      type: object
    risk:
      level: low
