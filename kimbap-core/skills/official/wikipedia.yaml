name: wikipedia
version: 1.0.0
description: Wikipedia REST API for article summaries, search, and historical events
base_url: https://en.wikipedia.org/api/rest_v1
auth:
  type: none
actions:
  get-summary:
    method: GET
    path: /page/summary/{title}
    description: Get a summary of a Wikipedia article by title
    args:
      - name: title
        type: string
        required: true
    request:
      path_params:
        title: "{title}"
    response:
      type: object
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 200
      retry_on: [429, 500, 502, 503]
  search:
    method: GET
    path: /page/search
    description: Search Wikipedia pages by query
    args:
      - name: q
        type: string
        required: true
      - name: limit
        type: integer
        required: false
        default: 5
    request:
      query:
        q: "{q}"
        limit: "{limit}"
    response:
      extract: pages
      type: array
    risk:
      level: low
  get-on-this-day:
    method: GET
    path: /feed/onthisday/events/{MM}/{DD}
    description: Get historical events that happened on a given month and day
    args:
      - name: MM
        type: string
        required: true
      - name: DD
        type: string
        required: true
    request:
      path_params:
        MM: "{MM}"
        DD: "{DD}"
    response:
      type: object
    risk:
      level: low
