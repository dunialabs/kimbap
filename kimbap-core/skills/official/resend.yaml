name: resend
version: 1.0.0
description: Resend API for sending emails and managing contacts
base_url: https://api.resend.com
auth:
  type: bearer
  credential_ref: resend.api_key
triggers:
  task_verbs: [send, deliver, list, manage]
  objects: [emails, contacts, audiences]
  instead_of:
    - calling Resend APIs directly with raw tokens
  exclusions:
    - unrelated actions outside email sending and contact management
gotchas:
  - symptom: send-email returns unauthorized/validation errors for sender
    likely_cause: from address domain is not verified in Resend dashboard
    recovery: Verify the sending domain and use a matching from_email address
    severity: high
  - symptom: Send request fails despite valid single recipient string
    likely_cause: to must be an array even for one recipient
    recovery: Pass to as an array like [user@example.com]
    severity: common
  - symptom: API responds with 422 Unprocessable Entity
    likely_cause: from/to values are malformed email addresses
    recovery: Validate email formats before calling send-email
    severity: medium
recipes:
  - name: Contact lifecycle messaging
    description: Create a contact, send to that contact, then verify contact presence
    steps:
      - Create contact in the target audience
      - Send email using the contact email in the to array
      - List contacts to confirm contact and audience state
actions:
  send-email:
    method: POST
    path: /emails
    description: Send an email via Resend
    warnings:
      - This sends a real email to the specified recipients
    args:
      - name: from_email
        type: string
        required: true
      - name: to
        type: array
        required: true
      - name: subject
        type: string
        required: true
      - name: text_body
        type: string
        required: true
      - name: html_body
        type: string
        required: false
      - name: reply_to
        type: string
        required: false
    request:
      body:
        from: "{from_email}"
        to: "{to}"
        subject: "{subject}"
        text: "{text_body}"
        html: "{html_body}"
        reply_to: "{reply_to}"
    response:
      type: object
    risk:
      level: high
  get-email:
    method: GET
    path: /emails/{email_id}
    description: Get details of a sent email
    args:
      - name: email_id
        type: string
        required: true
    request:
      path_params:
        email_id: "{email_id}"
    response:
      type: object
    risk:
      level: low
  list-emails:
    method: GET
    path: /emails
    description: List sent emails
    response:
      extract: data
      type: array
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 200
      retry_on: [429, 500, 502, 503]
  create-contact:
    method: POST
    path: /contacts
    description: Add a contact to an audience
    args:
      - name: email
        type: string
        required: true
      - name: audience_id
        type: string
        required: true
      - name: first_name
        type: string
        required: false
      - name: last_name
        type: string
        required: false
    request:
      body:
        email: "{email}"
        audience_id: "{audience_id}"
        first_name: "{first_name}"
        last_name: "{last_name}"
    response:
      type: object
    risk:
      level: medium
  list-contacts:
    method: GET
    path: /contacts
    description: List contacts in an audience
    args:
      - name: audience_id
        type: string
        required: true
    request:
      query:
        audience_id: "{audience_id}"
    response:
      extract: data
      type: array
    risk:
      level: low
  remove-contact:
    method: DELETE
    path: /contacts/{contact_id}
    description: Remove a contact
    warnings:
      - This permanently removes the contact
    args:
      - name: contact_id
        type: string
        required: true
    request:
      path_params:
        contact_id: "{contact_id}"
    response:
      type: object
    risk:
      level: high
