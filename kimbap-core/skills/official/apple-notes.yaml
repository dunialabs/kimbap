name: apple-notes
version: 1.0.0
description: Apple Notes via AppleScript
adapter: applescript
target_app: Notes
auth:
  type: none
actions:
  list-folders:
    command: list-folders
    description: List all folders in Apple Notes
    idempotent: true
    args: []
    response:
      type: array
    risk:
      level: low
  list-notes:
    command: list-notes
    description: List notes, optionally filtered by folder
    idempotent: true
    args:
      - name: folder
        type: string
        required: false
    response:
      type: array
    risk:
      level: low
  get-note:
    command: get-note
    description: Get a single note by name
    idempotent: true
    args:
      - name: name
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  search-notes:
    command: search-notes
    description: Search notes by keyword
    idempotent: true
    args:
      - name: query
        type: string
        required: true
    response:
      type: array
    risk:
      level: low
  create-note:
    command: create-note
    description: Create a new note
    idempotent: false
    args:
      - name: title
        type: string
        required: true
      - name: body
        type: string
        required: true
      - name: folder
        type: string
        required: false
        default: "Notes"
    response:
      type: object
    risk:
      level: medium
