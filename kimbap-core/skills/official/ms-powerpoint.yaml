name: ms-powerpoint
version: 1.0.0
description: Microsoft PowerPoint automation via AppleScript — presentation creation, slide editing, and export on macOS
adapter: applescript
target_app: Microsoft PowerPoint
auth:
  type: none
actions:
  create-presentation:
    command: ppt-create-presentation
    description: Create a new blank PowerPoint presentation
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  open-presentation:
    command: ppt-open-presentation
    description: Open a PowerPoint presentation from a POSIX file path
    idempotent: false
    args:
      - name: path
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  add-slide:
    command: ppt-add-slide
    description: Add a new slide to the active presentation
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  set-slide-text:
    command: ppt-set-slide-text
    description: Set text on a shape in a specific slide
    idempotent: false
    args:
      - name: slide_index
        type: integer
        required: true
      - name: shape_index
        type: integer
        required: false
        default: 1
      - name: text
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  save-as-pdf:
    command: ppt-save-as-pdf
    description: Export the active presentation as a PDF file
    idempotent: false
    args:
      - name: output_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  save-as-png:
    command: ppt-save-as-png
    description: Export the active presentation slides as PNG images
    idempotent: false
    args:
      - name: output_dir
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  close-presentation:
    command: ppt-close-presentation
    description: Close the active presentation
    idempotent: false
    args:
      - name: save
        type: boolean
        required: false
        default: false
    response:
      type: object
    risk:
      level: medium
