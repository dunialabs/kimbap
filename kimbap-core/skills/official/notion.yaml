name: notion
version: 1.0.0
description: Notion API for pages, databases, and block content management
base_url: https://api.notion.com/v1
auth:
  type: bearer
  credential_ref: notion.token
actions:
  search:
    method: POST
    path: /search
    description: Search across all pages and databases in the workspace
    args:
      - name: query
        type: string
        required: true
    request:
      headers:
        Notion-Version: "2022-06-28"
      body:
        query: "{query}"
    response:
      extract: results
      type: array
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 200
      retry_on: [429, 500, 502, 503]
  get-page:
    method: GET
    path: /pages/{page_id}
    description: Retrieve a page by its ID
    args:
      - name: page_id
        type: string
        required: true
    request:
      path_params:
        page_id: "{page_id}"
      headers:
        Notion-Version: "2022-06-28"
    response:
      type: object
    risk:
      level: low
  create-page:
    method: POST
    path: /pages
    description: Create a new page in a parent page or database
    args:
      - name: parent
        type: object
        required: true
      - name: properties
        type: object
        required: true
      - name: children
        type: array
        required: false
    request:
      headers:
        Notion-Version: "2022-06-28"
      body:
        parent: "{parent}"
        properties: "{properties}"
        children: "{children}"
    response:
      type: object
    risk:
      level: medium
  update-page:
    method: PATCH
    path: /pages/{page_id}
    description: Update page properties or archive status
    args:
      - name: page_id
        type: string
        required: true
      - name: properties
        type: object
        required: true
      - name: archived
        type: boolean
        required: false
    request:
      path_params:
        page_id: "{page_id}"
      headers:
        Notion-Version: "2022-06-28"
      body:
        properties: "{properties}"
        archived: "{archived}"
    response:
      type: object
    risk:
      level: medium
  append-blocks:
    method: PATCH
    path: /blocks/{block_id}/children
    description: Append child blocks to a parent block or page
    args:
      - name: block_id
        type: string
        required: true
      - name: children
        type: array
        required: true
    request:
      path_params:
        block_id: "{block_id}"
      headers:
        Notion-Version: "2022-06-28"
      body:
        children: "{children}"
    response:
      type: object
    risk:
      level: medium
  get-block-children:
    method: GET
    path: /blocks/{block_id}/children
    description: Retrieve child blocks of a given block or page
    args:
      - name: block_id
        type: string
        required: true
    request:
      path_params:
        block_id: "{block_id}"
      headers:
        Notion-Version: "2022-06-28"
    response:
      extract: results
      type: array
    risk:
      level: low
  query-database:
    method: POST
    path: /databases/{database_id}/query
    description: Query a Notion database with filters and sorts
    args:
      - name: database_id
        type: string
        required: true
      - name: filter
        type: object
        required: false
      - name: sorts
        type: array
        required: false
      - name: page_size
        type: integer
        required: false
        default: 100
    request:
      path_params:
        database_id: "{database_id}"
      headers:
        Notion-Version: "2022-06-28"
      body:
        filter: "{filter}"
        sorts: "{sorts}"
        page_size: "{page_size}"
    response:
      extract: results
      type: array
    risk:
      level: low
