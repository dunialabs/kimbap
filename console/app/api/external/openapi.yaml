openapi: 3.1.0
info:
  title: Kimbap Console External API
  version: 1.0.0
servers:
  - url: /api/external
security:
  - BearerAuth: []
paths:
  /auth/init:
    post:
      operationId: authInit
      summary: Initialize console auth and owner token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                masterPwd:
                  type: string
              required: [masterPwd]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proxy:
    get:
      operationId: proxyGet
      summary: Get current proxy info
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: proxyGetPost
      summary: Get current proxy info (POST)
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proxy/update:
    post:
      operationId: proxyUpdate
      summary: Update proxy configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                proxyId:
                  type: integer
                proxyName:
                  type: string
              required: [proxyId, proxyName]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tokens:
    get:
      operationId: tokensListGet
      summary: List tokens (GET)
      parameters:
        - in: query
          name: namespace
          required: false
          schema:
            type: string
        - in: query
          name: tags
          required: false
          description: comma-separated
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
    post:
      operationId: tokensListPost
      summary: List/query tokens (POST)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /tokens/get:
    get:
      operationId: tokensGetGet
      summary: Get token by id (GET)
      parameters:
        - in: query
          name: tokenId
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: tokensGetPost
      summary: Get token by id (POST)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tokenId:
                  type: string
              required: [tokenId]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tokens/create:
    post:
      operationId: tokensCreate
      summary: Batch create tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tokens:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      role:
                        type: integer
                      notes:
                        type: string
                      expiresAt:
                        type: integer
                      rateLimit:
                        type: integer
                      namespace:
                        type: string
                      tags:
                        type: array
                        items:
                          type: string
                      permissions:
                        type: array
                        items:
                          type: object
                          properties:
                            toolId:
                              type: string
                            functions:
                              type: array
                              items:
                                type: object
                                properties:
                                  funcName:
                                    type: string
                                  enabled:
                                    type: boolean
                                required: [funcName, enabled]
                            resources:
                              type: array
                              items:
                                type: object
                                properties:
                                  uri:
                                    type: string
                                  enabled:
                                    type: boolean
                                required: [uri, enabled]
                          required: [toolId]
                    required: [name, role]
              required: [tokens]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tokens/update:
    post:
      operationId: tokensUpdate
      summary: Update token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tokenId:
                  type: string
              required: [tokenId]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tokens/delete:
    post:
      operationId: tokensDelete
      summary: Delete token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tokenId:
                  type: string
              required: [tokenId]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tokens/batch-update:
    post:
      operationId: tokensBatchUpdate
      summary: Batch update tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tokenIds:
                  type: array
                  items:
                    type: string
                namespace:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                tagsMode:
                  type: string
                  enum: [replace, add, remove, clear]
                permissions:
                  type: array
                  items:
                    type: object
                    properties:
                      toolId:
                        type: string
                      functions:
                        type: array
                        items:
                          type: object
                          properties:
                            funcName:
                              type: string
                            enabled:
                              type: boolean
                          required: [funcName, enabled]
                      resources:
                        type: array
                        items:
                          type: object
                          properties:
                            uri:
                              type: string
                            enabled:
                              type: boolean
                          required: [uri, enabled]
                    required: [toolId]
                permissionsMode:
                  type: string
                  enum: [replace, merge]
              required: [tokenIds]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /policies:
    get:
      operationId: policiesListGet
      summary: List policies (GET)
      parameters:
        - in: query
          name: serverId
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
    post:
      operationId: policiesListPost
      summary: List/query policies (POST)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /policies/get:
    get:
      operationId: policiesGetGet
      summary: Get policy by id (GET)
      parameters:
        - in: query
          name: id
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
    post:
      operationId: policiesGetPost
      summary: Get policy by id (POST)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
              required: [id]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /policies/create:
    post:
      operationId: policiesCreate
      summary: Create policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serverId:
                  type: string
                dsl:
                  type: object
                  additionalProperties: true
              required: [dsl]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /policies/update:
    post:
      operationId: policiesUpdate
      summary: Update policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                dsl:
                  type: object
                  additionalProperties: true
                status:
                  type: string
                  enum: [active, archived]
              required: [id]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /policies/delete:
    post:
      operationId: policiesDelete
      summary: Delete policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
              required: [id]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /policies/effective:
    get:
      operationId: policiesEffectiveGet
      summary: Get effective policies (GET)
      parameters:
        - in: query
          name: serverId
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
    post:
      operationId: policiesEffectivePost
      summary: Get effective policies (POST)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /approvals:
    get:
      operationId: approvalsListGet
      summary: List approvals (GET)
      parameters:
        - in: query
          name: userId
          required: false
          schema:
            type: string
        - in: query
          name: serverId
          required: false
          schema:
            type: string
        - in: query
          name: toolName
          required: false
          schema:
            type: string
        - in: query
          name: status
          required: false
          schema:
            type: string
        - in: query
          name: page
          required: false
          schema:
            type: integer
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
    post:
      operationId: approvalsListPost
      summary: List/query approvals (POST)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /approvals/get:
    get:
      operationId: approvalsGetGet
      summary: Get approval by id (GET)
      parameters:
        - in: query
          name: id
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
    post:
      operationId: approvalsGetPost
      summary: Get approval by id (POST)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
              required: [id]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /approvals/count-pending:
    get:
      operationId: approvalsCountPendingGet
      summary: Count pending approvals (GET)
      parameters:
        - in: query
          name: userId
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
    post:
      operationId: approvalsCountPendingPost
      summary: Count pending approvals (POST)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /approvals/decide:
    post:
      operationId: approvalsDecide
      summary: Decide approval request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                decision:
                  type: string
                  enum: [APPROVED, REJECTED]
                reason:
                  type: string
              required: [id, decision]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /user-capabilities:
    get:
      operationId: userCapabilitiesListGet
      summary: List user capabilities (GET)
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
    post:
      operationId: userCapabilitiesListPost
      summary: List/query user capabilities (POST)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /user-capabilities/set:
    post:
      operationId: userCapabilitiesSet
      summary: Set user capabilities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /kimbap/connect:
    get:
      operationId: kimbapCoreConnectGet
      summary: Get kimbap connection status (GET)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: kimbapCoreConnectPost
      summary: Get kimbap connection status (POST)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required: [code, message]
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          $ref: '#/components/schemas/ErrorDetail'
      required: [success, error]
    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          additionalProperties: true
      required: [success, data]
