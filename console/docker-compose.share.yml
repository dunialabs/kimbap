services:
  postgres:
    image: postgres:16-alpine
    container_name: kimbap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kimbap
      POSTGRES_PASSWORD: ${KIMBAP_DB_PASSWORD:-kimbap123}
      POSTGRES_DB: ${KIMBAP_DB_NAME:-kimbap_db}
    ports:
      - '${KIMBAP_POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kimbap -d ${KIMBAP_DB_NAME:-kimbap_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kimbap-network

  # Kimbap Core Service (MCP Gateway)
  kimbap:
    image: dunialabs/kimbap:latest
    container_name: kimbap
    restart: unless-stopped
    pull_policy: always
    environment:
      KIMBAP_DATABASE_DRIVER: postgres
      KIMBAP_DATABASE_DSN: ${KIMBAP_CORE_DATABASE_URL:-postgresql://kimbap:${KIMBAP_DB_PASSWORD:-kimbap123}@postgres:5432/${KIMBAP_DB_NAME:-kimbap_db}?sslmode=disable}
    ports:
      - '${KIMBAP_CORE_PORT:-3002}:8080'
    networks:
      - kimbap-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8080/v1/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  kimbap-console:
    image: dunialabs/kimbap-console:latest
    container_name: kimbap-console-app
    restart: unless-stopped
    pull_policy: always
    ports:
      - '${KIMBAP_FRONTEND_PORT:-3000}:3000'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kimbap
      DB_PASSWORD: ${KIMBAP_DB_PASSWORD:-kimbap123}
      DB_NAME: ${KIMBAP_DB_NAME:-kimbap_db}
      DATABASE_URL: postgresql://kimbap:${KIMBAP_DB_PASSWORD:-kimbap123}@postgres:5432/${KIMBAP_DB_NAME:-kimbap_db}
      NODE_ENV: production
      KIMBAP_CORE_URL: ${KIMBAP_CORE_URL:-http://kimbap:8080}
    entrypoint: ['/app/docker/docker-entrypoint.sh']
    depends_on:
      postgres:
        condition: service_healthy
      kimbap:
        condition: service_started
    networks:
      - kimbap-network
    volumes:
      - ./cloudflared:/app/cloudflared

  # Cloudflare Tunnel (optional)
  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}
    container_name: kimbap-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # Required when using token mode
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - kimbap-network
    volumes:
      # If you use config file mode, place config + cert in ./cloudflared
      - ./cloudflared:/etc/cloudflared
    depends_on:
      kimbap-console:
        condition: service_started
      kimbap:
        condition: service_started
    profiles:
      - cloudflared

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: kimbap-adminer
    restart: unless-stopped
    ports:
      - '${KIMBAP_ADMINER_PORT:-8080}:8080'
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - kimbap-network

volumes:
  postgres_data:
    driver: local

networks:
  kimbap-network:
    name: kimbap-network
    driver: bridge
