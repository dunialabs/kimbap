version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: kimbap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kimbap
      POSTGRES_PASSWORD: kimbap123
      POSTGRES_DB: kimbap_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kimbap -d kimbap_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kimbap Console 应用（使用Docker Hub镜像）
  kimbap-console:
    image: dunialabs/kimbap-console:latest
    container_name: kimbap-console-app
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kimbap
      DB_PASSWORD: kimbap123
      DB_NAME: kimbap_db
      DATABASE_URL: postgresql://kimbap:kimbap123@postgres:5432/kimbap_db
      NODE_ENV: production
      PORT: 3000
      BACKEND_PORT: 3002
    ports:
      - "3000:3000"  # 前端
      - "3002:3002"  # 后端API
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: