services:
  postgres:
    image: postgres:16-alpine
    container_name: kimbap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kimbap
      POSTGRES_PASSWORD: ${KIMBAP_DB_PASSWORD:-kimbap123}
      POSTGRES_DB: kimbap_db
    ports:
      - '${KIMBAP_POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kimbap -d kimbap_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kimbap-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    # platform: linux/amd64  # Let Docker pick the right architecture
    container_name: kimbap-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # Cloudflare Tunnel Token (Required for HTTPS remote access)
      # Get your token from: https://dash.cloudflare.com/ → Zero Trust → Networks → Tunnels
      # Set it in .env file: CLOUDFLARE_TUNNEL_TOKEN=your-token-here
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    networks:
      - kimbap-network
    volumes:
      - ./cloudflared:/etc/cloudflared
    depends_on:
      kimbap-console:
        condition: service_started
      kimbap-core:
        condition: service_started
    profiles:
      - cloudflared

  # Kimbap Core Service (MCP Gateway)
  kimbap-core:
    image: dunialabs/kimbap-core:latest
    # platform: linux/amd64  # Let Docker pick the right architecture
    container_name: kimbap-core
    restart: unless-stopped
    pull_policy: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${KIMBAP_CORE_DATABASE_URL:-postgresql://kimbap:kimbap123@postgres:5432/kimbap_db?schema=public}
      PORT: 3002
      BACKEND_PORT: 3002
      JWT_SECRET: ${KIMBAP_CORE_JWT_SECRET:-${JWT_SECRET:-kimbap-default-jwt-secret-change-in-production}}
    ports:
      - '${KIMBAP_CORE_PORT:-3002}:3002'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kimbap-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3002/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  kimbap-console:
    image: dunialabs/kimbap-console:latest
    # platform: linux/amd64  # Let Docker pick the right architecture
    container_name: kimbap-console-app
    restart: unless-stopped
    pull_policy: always
    ports:
      - '${KIMBAP_FRONTEND_PORT:-3000}:3000'
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:./data/kimbap-console.db}
      NODE_ENV: production
      KIMBAP_CORE_URL: ${KIMBAP_CORE_URL:-http://kimbap-core:3002}
    entrypoint: ['/app/docker/docker-entrypoint.sh']
    depends_on:
      kimbap-core:
        condition: service_started
    networks:
      - kimbap-network
    volumes:
      - ./cloudflared:/app/cloudflared

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: kimbap-adminer
    restart: unless-stopped
    profiles: ['postgres']
    ports:
      - '${KIMBAP_ADMINER_PORT:-8080}:8080'
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - kimbap-network

volumes:
  postgres_data:
    driver: local

networks:
  kimbap-network:
    name: kimbap-network # Use a fixed name so different compose files share the same network
    driver: bridge
