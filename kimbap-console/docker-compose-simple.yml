version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: kimbap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kimbap
      POSTGRES_PASSWORD: kimbap123
      POSTGRES_DB: kimbap_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kimbap -d kimbap_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kimbap-network

  # KIMBAP Console app
  kimbap-console:
image: kimbap/kimbap-console:latest
    container_name: kimbap-console-app
    restart: unless-stopped
    environment:
      # Database configuration - uses the postgres service name
      DATABASE_URL: postgresql://kimbap:kimbap123@postgres:5432/kimbap_db?schema=public
      
      # Application configuration
      NODE_ENV: production
      
      # Port configuration
      PORT: 3000
      BACKEND_PORT: 3002
    ports:
      - "3000:3000"  # Frontend
      - "3002:3002"  # Backend API
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kimbap-network
    volumes:
      - app_logs:/app/logs

volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local

networks:
  kimbap-network:
    driver: bridge
