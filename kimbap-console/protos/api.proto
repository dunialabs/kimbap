// operate tool
message Request10005 {
  Request common = 1;
  Params params = 2;
	message Params {
    int32 handleType = 1;  // 1-add, 2-edit, 3-enable, 4-disable, 5-delete, 6-restart
    int32 proxyId = 2;
    string toolId = 3; // unique id
    repeated Credential authConf = 4;
    repeated ToolFunction functions = 5;
    repeated ToolResource resources = 6;
    string masterPwd = 7;
    int32 allowUserInput = 8; // 1-True, else-False
    int32 category = 9; // 1-Template tool, 2-Custom MCP URL tool, 3-REST API tool, 4-Skills tool
    CustomRemoteConfig customRemoteConfig = 10; // Custom MCP URL configuration (for category=2)
    string toolTmplId = 11; // Template ID (for category=1)
    string serverName = 12; // Server name (for category=4 Skills)
    string restApiConfig = 13; // REST API configuration JSON string (for category=3)
    bool lazyStartEnabled = 14; // Enable lazy loading for this server
    bool publicAccess = 15; // Public access for this server, default is false
	}
}

message Response10005 {
  Data data = 2;
	message Data {
    string toolId = 1;
    int32 isStartServer = 2; // 1-successful start, 2-failed start
	}
}

