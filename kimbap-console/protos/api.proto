// Dashboard overview statistics
message Request10023 {
  Request common = 1;
  Params params = 2;
  message Params {
    string timeRange = 1; // 时间范围: "24h", "7d", "30d", "90d"
  }
}

message Response10023 {
  Response common = 1;
  Data data = 2;
  message Data {
    // 基础统计
    string uptime = 1; // 服务器运行时间，格式如 "5 days, 12 hours"
    int32 apiRequests = 2; // API请求总数
    int32 activeTokens = 3; // 活跃的token数量
    int32 configuredTools = 4; // 配置的工具数量
    int32 connectedClientsCount = 5; // 连接的客户端数量 (兼容字段)
    int32 monthlyUsage = 6; // 月度使用百分比（0-100）
    
    // 工具使用分布（按请求次数排序）
    repeated ToolUsage toolsUsage = 7;
    message ToolUsage {
      string name = 1; // 工具名称
      int32 requests = 2; // 请求次数
      int32 percentage = 3; // 占总请求的百分比（0-100）
    }
    
    // Token使用分布（按请求次数排序）
    repeated TokenUsage tokenUsage = 8;
    message TokenUsage {
      string name = 1; // token名称/用户名
      string token = 2; // token最后4位，如 "...a3b4"
      int32 requests = 3; // 请求次数
      int32 percentage = 4; // 占总请求的百分比（0-100）
    }
    
    // 连接的客户端详情
    repeated ConnectedClient connectedClients = 9;
    message ConnectedClient {
      string id = 1; // 客户端ID
      string name = 2; // 客户端名称
      string token = 3; // 使用的token（最后4位）
      string ip = 4; // IP地址
      string location = 5; // 位置信息
      string lastActive = 6; // 最后活跃时间
      int32 requests = 7; // 请求次数
    }
    
    // 最近活动
    repeated RecentActivity recentActivity = 10;
    message RecentActivity {
      string action = 1; // 动作描述
      string status = 2; // 状态: "success", "warning", "info"
      string time = 3; // 时间描述，如 "2 minutes ago"
    }
    string sshTunnelAddress = 11;
    string manualConnection = 12;
  }
}


