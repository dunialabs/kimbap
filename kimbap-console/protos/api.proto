// ============ Tool Usage Statistics APIs (20001-20010) ============

// get tool usage summary [GET /api/20001]
// 获取工具使用情况汇总统计
message Request20001 {
  Request common = 1;
  Params params = 2;
	message Params {
    int32 timeRange = 1; // 时间范围: 1-今天, 7-最近7天, 30-最近30天, 90-最近90天
    int32 serverId = 2; // 服务器ID，0表示所有服务器
	}
}

message Response20001 {
  Response common = 1;
	Data data = 2;
	message Data {
    int32 totalTools = 1; // 工具总数
    int32 activeTools = 2; // 活跃工具数（有请求的）
    int32 totalRequests = 3; // 总请求数
    int32 successRequests = 4; // 成功请求数
    int32 failedRequests = 5; // 失败请求数
    float avgSuccessRate = 6; // 平均成功率(%)
    int32 avgResponseTime = 7; // 平均响应时间(ms)
    int32 totalUsers = 8; // 使用工具的用户总数
	}
}

// get tool detailed metrics [GET /api/20002]
// 获取各工具详细指标数据
message Request20002 {
  Request common = 1;
  Params params = 2;
	message Params {
    int32 timeRange = 1; // 时间范围: 1-今天, 7-最近7天, 30-最近30天, 90-最近90天
    int32 serverId = 2; // 服务器ID，0表示所有服务器
    string toolId = 3; // 特定工具ID，空表示所有工具
    int32 page = 4; // 分页-页码
    int32 pageSize = 5; // 分页-每页数量
	}
}

message Response20002 {
  Response common = 1;
	Data data = 2;
	message Data {
    repeated ToolMetrics toolMetrics = 1;
    int32 totalCount = 2; // 总数量（用于分页）
    message ToolMetrics {
      string toolId = 1; // 工具ID
      string toolName = 2; // 工具名称
      int32 toolType = 3; // 工具类型
      int32 totalRequests = 4; // 总请求数
      int32 successRequests = 5; // 成功请求数
      int32 failedRequests = 6; // 失败请求数
      float successRate = 7; // 成功率(%)
      int32 avgResponseTime = 8; // 平均响应时间(ms)
      int32 minResponseTime = 9; // 最小响应时间(ms)
      int32 maxResponseTime = 10; // 最大响应时间(ms)
      int32 lastUsed = 11; // 最后使用时间(时间戳)
      int32 status = 12; // 工具状态: 1-active, 2-inactive, 3-error
      int32 uniqueUsers = 13; // 使用该工具的独立用户数
    }
	}
}

// get tool usage trends [GET /api/20003]
// 获取工具使用趋势数据（用于折线图）
message Request20003 {
  Request common = 1;
  Params params = 2;
	message Params {
    int32 timeRange = 1; // 时间范围: 7-最近7天, 30-最近30天, 90-最近90天
    int32 serverId = 2; // 服务器ID，0表示所有服务器
    repeated string toolIds = 3; // 要查看趋势的工具ID列表，空表示所有工具
    int32 granularity = 4; // 数据粒度: 1-按小时, 2-按天, 3-按周
	}
}

message Response20003 {
  Response common = 1;
	Data data = 2;
	message Data {
    repeated TrendPoint trendData = 1;
    message TrendPoint {
      string date = 1; // 日期/时间点 (格式: "2024-01-15" 或 "2024-01-15 14:00")
      repeated ToolCount toolCounts = 2; // 各工具在该时间点的请求数
      message ToolCount {
        string toolId = 1; // 工具ID
        string toolName = 2; // 工具名称
        int32 requestCount = 3; // 请求数量
        int32 successCount = 4; // 成功数量
        int32 failedCount = 5; // 失败数量
      }
    }
	}
}

// get tool error analysis [GET /api/20004]
// 获取工具错误分析数据
message Request20004 {
  Request common = 1;
  Params params = 2;
	message Params {
    int32 timeRange = 1; // 时间范围: 1-今天, 7-最近7天, 30-最近30天, 90-最近90天
    int32 serverId = 2; // 服务器ID，0表示所有服务器
    string toolId = 3; // 特定工具ID，空表示所有工具
	}
}

message Response20004 {
  Response common = 1;
	Data data = 2;
	message Data {
    repeated ToolErrors toolErrors = 1;
    message ToolErrors {
      string toolId = 1; // 工具ID
      string toolName = 2; // 工具名称
      int32 totalErrors = 3; // 总错误数
      repeated ErrorType errorTypes = 4; // 错误类型分布
      message ErrorType {
        string errorCode = 1; // 错误代码
        string errorMessage = 2; // 错误描述
        int32 count = 3; // 发生次数
        float percentage = 4; // 占比(%)
        int32 lastOccurred = 5; // 最后发生时间(时间戳)
      }
    }
	}
}

// get tool usage distribution [GET /api/20005]
// 获取工具使用分布数据（用于饼图）
message Request20005 {
  Request common = 1;
  Params params = 2;
	message Params {
    int32 timeRange = 1; // 时间范围: 1-今天, 7-最近7天, 30-最近30天, 90-最近90天
    int32 serverId = 2; // 服务器ID，0表示所有服务器
    int32 metricType = 3; // 指标类型: 1-按请求数, 2-按用户数, 3-按响应时间
	}
}

message Response20005 {
  Response common = 1;
	Data data = 2;
	message Data {
    repeated Distribution distribution = 1;
    message Distribution {
      string toolId = 1; // 工具ID
      string toolName = 2; // 工具名称
      int32 value = 3; // 数值（请求数/用户数/响应时间）
      float percentage = 4; // 占比(%)
    }
	}
}

// get tool performance comparison [GET /api/20006]
// 获取工具性能对比数据（用于柱状图）
message Request20006 {
  Request common = 1;
  Params params = 2;
	message Params {
    int32 timeRange = 1; // 时间范围: 1-今天, 7-最近7天, 30-最近30天, 90-最近90天
    int32 serverId = 2; // 服务器ID，0表示所有服务器
    int32 metricType = 3; // 对比指标: 1-响应时间, 2-成功率, 3-请求量
	}
}

message Response20006 {
  Response common = 1;
	Data data = 2;
	message Data {
    repeated ToolComparison comparison = 1;
    message ToolComparison {
      string toolId = 1; // 工具ID
      string toolName = 2; // 工具名称
      float avgValue = 3; // 平均值
      float minValue = 4; // 最小值
      float maxValue = 5; // 最大值
    }
	}
}

// get user tool usage [GET /api/20007]
// 获取用户工具使用情况
message Request20007 {
  Request common = 1;
  Params params = 2;
	message Params {
    int32 timeRange = 1; // 时间范围: 1-今天, 7-最近7天, 30-最近30天, 90-最近90天
    string userId = 3; // 用户ID，空表示所有用户
    int32 page = 4; // 分页-页码
    int32 pageSize = 5; // 分页-每页数量
	}
}

message Response20007 {
  Response common = 1;
	Data data = 2;
	message Data {
    repeated UserUsage userUsage = 1;
    int32 totalCount = 2; // 总数量（用于分页）
    message UserUsage {
      string userId = 1; // 用户ID
      string userName = 2; // 用户名称
      int32 role = 3; // 用户角色: 1-owner, 2-admin, 3-member
      int32 totalRequests = 4; // 总请求数
      int32 toolsUsed = 5; // 使用的工具数量
      repeated ToolUsage topTools = 6; // 最常用的工具TOP5
      int32 lastActive = 7; // 最后活跃时间(时间戳)
      message ToolUsage {
        string toolId = 1; // 工具ID
        string toolName = 2; // 工具名称
        int32 requestCount = 3; // 请求次数
      }
    }
	}
}

// get real-time tool status [GET /api/20008]
// 获取工具实时状态
message Request20008 {
  Request common = 1;
  Params params = 2;
	message Params {
    int32 serverId = 1; // 服务器ID，0表示所有服务器
	}
}

message Response20008 {
  Response common = 1;
	Data data = 2;
	message Data {
    repeated ToolStatus toolStatus = 1;
    message ToolStatus {
      string toolId = 1; // 工具ID
      string toolName = 2; // 工具名称
      int32 status = 3; // 状态: 0-online, 1-offline, 2-connecting, 3-error
      int32 activeConnections = 4; // 当前活跃连接数
      int32 queuedRequests = 5; // 排队请求数
