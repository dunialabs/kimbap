// operate access token
message Request10008 {
  Request common = 1;
  Params params = 2;
	message Params {
    int32 handleType = 1; // 1-add, 2-edit, 3-delete, 4-bulk update
    string userid = 2;
    string name = 3;
    int32 role = 4; // 2-admin, 3-member
    int32 expireAt = 5;
    int32 rateLimit = 6;
    string notes = 7;
    repeated Tool permissions = 8;
    string masterPwd = 9;
    int32 proxyId = 10;
    string namespace = 11; // Token namespace
    repeated string tags = 12; // Token tags
    // Bulk update fields (handleType=4)
    repeated string userids = 13; // Target token IDs for bulk update
    string permissionsMode = 14; // "replace" or "merge"
    string tagsMode = 15; // "replace", "add", "remove", or "clear"
	}
}

message Response10008 {
  Data data = 2;
	message Data {
    string accessToken = 1;
    // Bulk update response fields (handleType=4)
    int32 updatedCount = 2;
    int32 failedCount = 3;
    repeated BulkUpdateFailure failures = 4;
	}
}

