syntax = "proto3";

package peta.api;

message Request {
  int32 cmdId = 1;
  string userid = 2;
}

message Response {
  int32 code = 1;
  string message = 2;
  int32 cmdId = 3;
  string errorCode = 4;
}

message KV {
  string key = 1;
  string value = 2;
}

message TokenInfo {
  string userid = 1;
  int32 role = 2; // 1-owner, 2-admin
  int32 createAt = 3;
}


message Credential {
  string name = 1;
  string description = 2;
  int32 dataType = 3; // 1-input, 2-radio, 3-checkbox, 4-select...
  string key = 4;
  string value = 5;
  repeated KV options = 6;
  KV selected = 7;
}

message ToolFunction {
  string funcName = 1;
  bool enabled = 2; // default true
  int32 dangerLevel = 3; // 0: No validation, 1: hint only (keep fields), 2: validation required
  string description = 4; // description for the function
}

message ToolResource {
  string uri = 1;
  bool enabled = 2; // default true
}

message CustomRemoteConfig {
  string url = 1;
  repeated KV headers = 2;
}

message Tool {
  string toolTmplId = 1;
  int32 toolType = 2; // 1-Brave Search
  string name = 3;
  string description = 4;
  repeated string tags = 5;
  repeated string authtags = 6;
  repeated Credential credentials = 7;
  repeated ToolFunction toolFuncs = 8;
  repeated ToolResource toolResources = 9;
  int32 lastUsed = 10;
  bool enabled = 11;
  string toolId = 12;
  int32 runningState = 13; // 0-online，1-offline，2-connecting，3-error
  int32 authType = 14; // auth类型: 1-apiKey, 2-googleAuth, 3-notion
  int32 allowUserInput = 15; // 1-True, else-False
  int32 category = 16; // 1-common tool, 2-custom tool
  string authConfig =17;
}

message AccessToken {
  string tokenId = 1;
  string name = 2;
  int32 role = 3; // 1-owner, 2-admin, 3-member
  string notes = 4;
  int32 lastUsed = 5;
  int32 createAt = 6;
  int32 expireAt = 7;
  int32 rateLimit = 8;
  repeated Tool toolList = 9;
  string namespace = 10; // Token namespace (default: "default")
  repeated string tags = 11; // Token tags
}

message License {
  string plan = 1;
  int32 status = 2;  // 100: active, 1: inactive, 2: expired
  int32 expiresAt = 3;
  int32 createdAt = 4;
  string customerEmail = 5;
  string licenseStr = 6;
  int32 maxToolCreations = 8;
  int32 maxAccessTokens = 9;
  int32 currentToolCreations = 10;
  int32 currentAccessTokens = 11;
}

// create owner token [POST /api/10001]
message Request10001 {
  Request common = 1;
  Params params = 2;
	message Params {
    string masterPwd = 1;
	}
}

message Response10001 {
  Response common = 1;
	Data data = 2;
	message Data {
