    string filterValue = 3; // 过滤值（如具体的工具名称或令牌ID）
    int32 page = 4; // 分页-页码
    int32 pageSize = 5; // 分页-每页数量
	}
}

message Response22010 {
  Response common = 1;
	Data data = 2;
	message Data {
    repeated DetailedLogEntry logs = 1;
    int32 totalCount = 2; // 总数量（用于分页）
    message DetailedLogEntry {
      string logId = 1; // 日志ID
      string timestamp = 2; // 时间戳（格式化）
      string toolName = 3; // 工具名称
      string tokenId = 4; // 令牌ID（脱敏）
      string action = 5; // 操作类型
      int32 statusCode = 6; // 状态码
      int32 responseTime = 7; // 响应时间
      string clientIP = 8; // 客户端IP（脱敏）
      string errorMessage = 9; // 错误信息（如果有）
    }
	}
}

// ===== Logs Management Interfaces (23001-23010) =====

// get logs with filters [GET /api/23001]
// 获取日志列表（支持多种过滤条件）
message Request23001 {
  Request common = 1;
  Params params = 2;
	message Params {
    int32 page = 1; // 分页-页码，从1开始
    int32 pageSize = 2; // 分页-每页数量，默认50
    string timeRange = 3; // 时间范围: "1h", "6h", "24h", "7d", "all"
    string level = 4; // 日志级别: "all", "INFO", "WARN", "ERROR", "DEBUG"
    string source = 5; // 日志来源: "all", "api-gateway", "tool-manager", etc.
    string search = 6; // 搜索关键词（搜索message和rawData）
    string requestId = 7; // 请求ID过滤
    string userId = 8; // 用户ID过滤
	}
}

message Response23001 {
  Response common = 1;
	Data data = 2;
	message Data {
    repeated LogEntry logs = 1;
    int32 totalCount = 2; // 总记录数（用于分页）
    int32 totalPages = 3; // 总页数
    repeated string availableSources = 4; // 可用的日志来源列表
    message LogEntry {
      string id = 1; // 日志ID
      string timestamp = 2; // 时间戳（格式化）
      string level = 3; // 日志级别: INFO, WARN, ERROR, DEBUG
      string message = 4; // 日志消息
      string source = 5; // 日志来源
      string requestId = 6; // 请求ID（可选）
      string userId = 7; // 用户ID（可选）
      string rawData = 8; // 原始日志数据
      LogDetails details = 9; // 详细信息
      message LogDetails {
        string method = 1; // HTTP方法
        string url = 2; // 请求URL
        int32 statusCode = 3; // 状态码
        int32 responseTime = 4; // 响应时间(毫秒)
        string userAgent = 5; // 用户代理
        string ip = 6; // 客户端IP
        string tokenId = 7; // 令牌ID（脱敏）
        string toolName = 8; // 工具名称
        string errorType = 9; // 错误类型
        string stackTrace = 10; // 堆栈跟踪（ERROR级别）
      }
    }
	}
}

// get log statistics [GET /api/23002]
// 获取日志统计信息
message Request23002 {
  Request common = 1;
  Params params = 2;
	message Params {
    string timeRange = 1; // 时间范围: "1h", "6h", "24h", "7d"
	}
}

message Response23002 {
  Response common = 1;
	Data data = 2;
	message Data {
    LogStatistics statistics = 1;
    message LogStatistics {
      int32 totalLogs = 1; // 总日志数
      int32 errorLogs = 2; // 错误日志数
      int32 warnLogs = 3; // 警告日志数
      int32 infoLogs = 4; // 信息日志数
      int32 debugLogs = 5; // 调试日志数
      double errorRate = 6; // 错误率（百分比）
      repeated SourceStats sourceStats = 7; // 按来源统计
      repeated HourlyStats hourlyStats = 8; // 按小时统计（最近24小时）
      message SourceStats {
        string source = 1; // 来源名称
        int32 logCount = 2; // 日志数量
        int32 errorCount = 3; // 错误数量
        double percentage = 4; // 占总日志的百分比
      }
      message HourlyStats {
        string hour = 1; // 小时标签，如 "14:00"
        int32 totalCount = 2; // 该小时总日志数
        int32 errorCount = 3; // 该小时错误数
        int32 timestamp = 4; // 时间戳
      }
    }
	}
}

// get log details by ID [GET /api/23003]
// 获取单个日志的详细信息
message Request23003 {
  Request common = 1;
  Params params = 2;
	message Params {
    string logId = 1; // 日志ID
	}
}

message Response23003 {
  Response common = 1;
	Data data = 2;
	message Data {
    LogEntry logDetail = 1; // 详细日志信息（使用23001中的LogEntry结构）
    repeated LogEntry relatedLogs = 2; // 相关日志（同一requestId或userId）
	}
}

// export logs [GET /api/23004]
// 导出日志
message Request23004 {
  Request common = 1;
  Params params = 2;
	message Params {
    string timeRange = 1; // 时间范围: "1h", "6h", "24h", "7d"
    string level = 2; // 日志级别过滤
    string source = 3; // 日志来源过滤
    string search = 4; // 搜索关键词
    int32 format = 5; // 导出格式: 1-TXT, 2-JSON, 3-CSV
    int32 maxRecords = 6; // 最大记录数限制，默认10000
	}
}

message Response23004 {
  Response common = 1;
	Data data = 2;
	message Data {
    string downloadUrl = 1; // 下载链接
    string fileName = 2; // 文件名
    int32 fileSize = 3; // 文件大小（字节）
    int32 recordCount = 4; // 实际导出的记录数
    int32 expiresAt = 5; // 链接过期时间(时间戳)
	}
}

// get real-time logs [GET /api/23005]
// 获取实时日志（用于流式更新）
message Request23005 {
  Request common = 1;
  Params params = 2;
	message Params {
    int32 lastLogId = 1; // 最后接收到的日志ID（用于增量获取）
    string level = 2; // 日志级别过滤
    string source = 3; // 日志来源过滤
    int32 limit = 4; // 返回数量限制，默认50
	}
}

message Response23005 {
  Response common = 1;
	Data data = 2;
	message Data {
    repeated LogEntry newLogs = 1; // 新日志列表
    int32 latestLogId = 2; // 最新日志ID
    bool hasMore = 3; // 是否还有更多日志
	}
}

// get log error analysis [GET /api/23006]
// 获取日志错误分析
message Request23006 {
  Request common = 1;
  Params params = 2;
	message Params {
    string timeRange = 1; // 时间范围: "1h", "6h", "24h", "7d"
	}
}

message Response23006 {
  Response common = 1;
	Data data = 2;
	message Data {
    ErrorAnalysis analysis = 1;
    message ErrorAnalysis {
      int32 totalErrors = 1; // 总错误数
      double errorRate = 2; // 错误率
      repeated ErrorPattern topErrors = 3; // 最常见错误
      repeated ErrorTrend errorTrend = 4; // 错误趋势
      repeated ErrorSource errorSources = 5; // 错误来源分布
      message ErrorPattern {
        string errorType = 1; // 错误类型
        string message = 2; // 错误消息模式
        int32 count = 3; // 出现次数
        double percentage = 4; // 占总错误的百分比
        string firstSeen = 5; // 首次出现时间
        string lastSeen = 6; // 最后出现时间
      }
      message ErrorTrend {
        string timeLabel = 1; // 时间标签
        int32 errorCount = 2; // 错误数量
        int32 timestamp = 3; // 时间戳
      }
      message ErrorSource {
        string source = 1; // 错误来源
        int32 errorCount = 2; // 错误数量
        double percentage = 3; // 占总错误的百分比
      }
    }
	}
}

// manage log retention [POST /api/23007]
// 管理日志保留策略
message Request23007 {
  Request common = 1;
  Params params = 2;
	message Params {
    int32 operation = 1; // 操作类型: 1-获取配置, 2-更新配置, 3-清理旧日志
    int32 retentionDays = 2; // 保留天数（operation=2时）
    string purgeOlderThan = 3; // 清理早于指定时间的日志（operation=3时）
    repeated string levelsToPurge = 4; // 要清理的日志级别（operation=3时）
	}
}

message Response23007 {
  Response common = 1;
	Data data = 2;
	message Data {
    RetentionConfig config = 1; // 保留配置
    PurgeResult purgeResult = 2; // 清理结果（operation=3时）
    message RetentionConfig {
      int32 retentionDays = 1; // 当前保留天数
      int32 maxLogSize = 2; // 最大日志大小（MB）
      repeated string autoCleanupLevels = 3; // 自动清理的级别
      bool compressionEnabled = 4; // 是否启用压缩
    }
    message PurgeResult {
      int32 deletedCount = 1; // 删除的日志数量
      int32 freedSpaceMB = 2; // 释放的空间（MB）
      string operation = 3; // 执行的操作
    }
	}
}

// get log performance metrics [GET /api/23008]
// 获取日志性能指标
message Request23008 {
  Request common = 1;
  Params params = 2;
	message Params {
    string timeRange = 1; // 时间范围: "1h", "6h", "24h", "7d"
	}
}

message Response23008 {
  Response common = 1;
	Data data = 2;
	message Data {
    PerformanceMetrics metrics = 1;
    message PerformanceMetrics {
      double avgResponseTime = 1; // 平均响应时间
      double p95ResponseTime = 2; // 95%分位响应时间
      double p99ResponseTime = 3; // 99%分位响应时间
      int32 totalRequests = 4; // 总请求数
      int32 slowRequests = 5; // 慢请求数（>1000ms）
      double throughput = 6; // 吞吐量（请求/秒）
      repeated ToolPerformance toolPerformance = 7; // 工具性能统计
      repeated TimeSlotPerformance timeSlots = 8; // 时间段性能
      message ToolPerformance {
        string toolName = 1; // 工具名称
        double avgResponseTime = 2; // 平均响应时间
        int32 requestCount = 3; // 请求数
        int32 errorCount = 4; // 错误数
        double errorRate = 5; // 错误率
      }
      message TimeSlotPerformance {
        string timeLabel = 1; // 时间标签
        double avgResponseTime = 2; // 平均响应时间
        int32 requestCount = 3; // 请求数
        int32 timestamp = 4; // 时间戳
      }
    }
	}
}

// search logs with advanced filters [GET /api/23009]
// 高级日志搜索
message Request23009 {
  Request common = 1;
  Params params = 2;
	message Params {
    string query = 1; // 搜索查询语句
    repeated string fields = 2; // 搜索字段: ["message", "rawData", "source", "requestId"]
    string timeStart = 3; // 开始时间（ISO格式）
    string timeEnd = 4; // 结束时间（ISO格式）
    repeated string levels = 5; // 日志级别列表
    repeated string sources = 6; // 日志来源列表
    int32 page = 7; // 分页-页码
    int32 pageSize = 8; // 分页-每页数量
    string sortBy = 9; // 排序字段: "timestamp", "level", "source"
    string sortOrder = 10; // 排序方向: "asc", "desc"
	}
}

message Response23009 {
  Response common = 1;
	Data data = 2;
	message Data {
    repeated LogEntry searchResults = 1; // 搜索结果
    int32 totalMatches = 2; // 匹配总数
    SearchMetadata metadata = 3; // 搜索元数据
    message SearchMetadata {
      string query = 1; // 执行的查询
      int32 searchTime = 2; // 搜索耗时（毫秒）
      repeated string suggestedFilters = 3; // 建议的过滤器
      repeated HighlightMatch highlights = 4; // 高亮匹配
      message HighlightMatch {
        string logId = 1; // 日志ID
        string field = 2; // 匹配字段
        string matchedText = 3; // 匹配的文本
      }
    }
	}
}

// get log audit trail [GET /api/23010]
// 获取日志审计跟踪
message Request23010 {
  Request common = 1;
  Params params = 2;
	message Params {
    string entityType = 1; // 实体类型: "user", "token", "request", "session"
    string entityId = 2; // 实体ID
    string timeRange = 3; // 时间范围: "1h", "6h", "24h", "7d"
    int32 page = 4; // 分页-页码
    int32 pageSize = 5; // 分页-每页数量
	}
}

message Response23010 {
  Response common = 1;
	Data data = 2;
	message Data {
    repeated AuditEvent auditTrail = 1; // 审计跟踪记录
    int32 totalCount = 2; // 总记录数
    AuditSummary summary = 3; // 审计摘要
    message AuditEvent {
      string timestamp = 1; // 时间戳
      string eventType = 2; // 事件类型
      string action = 3; // 执行的操作
      string source = 4; // 来源
      string level = 5; // 日志级别
      string details = 6; // 详细信息
      string relatedLogId = 7; // 关联的日志ID
    }
    message AuditSummary {
      int32 totalEvents = 1; // 总事件数
      int32 errorEvents = 2; // 错误事件数
      string firstActivity = 3; // 首次活动时间
      string lastActivity = 4; // 最后活动时间
      repeated string involvedSources = 5; // 涉及的来源
    }
	}
}


// ============ Skills Management API (10040-10043) ============

message SkillInfo {
  string name = 1;
  string description = 2;
  string version = 3;
  string updatedAt = 4;               // ISO timestamp of last update
}

// list all skills for a server [POST /api/10040]
message Request10040 {
  Request common = 1;
  Params params = 2;
  message Params {
    string serverId = 1;              // Skills Server ID
  }
}

message Response10040 {
  Response common = 1;
  Data data = 2;
  message Data {
    repeated SkillInfo skills = 1;
  }
}

// upload skills bundle to a server [POST /api/10041]
// Uploads a ZIP containing the entire skills directory
// Backend will auto-detect and extract skill directories (those containing SKILL.md)
message Request10041 {
  Request common = 1;
  Params params = 2;
  message Params {
    string serverId = 1;              // Skills Server ID
    string data = 2;                  // ZIP file content (base64 encoded)
  }
}

message Response10041 {
  Response common = 1;
  Data data = 2;
  message Data {
    bool success = 1;
    string message = 2;
    string skillName = 3;
  }
}

// delete skill from a server [POST /api/10042]
message Request10042 {
  Request common = 1;
  Params params = 2;
  message Params {
    string serverId = 1;              // Skills Server ID
    string skillName = 2;             // Skill name to delete
  }
}

message Response10042 {
  Response common = 1;
  Data data = 2;
  message Data {
    bool success = 1;
    string message = 2;
  }
}

// delete all skills for a server [POST /api/10043]
// Used when deleting the entire Skills tool
message Request10043 {
  Request common = 1;
  Params params = 2;
  message Params {
    string serverId = 1;              // Skills Server ID
  }
}

message Response10043 {
  Response common = 1;
  Data data = 2;
  message Data {
    bool success = 1;
    string message = 2;
  }
}