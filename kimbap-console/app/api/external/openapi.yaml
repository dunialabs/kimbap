components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          $ref: '#/components/schemas/ErrorDetail'
      required:
        - success
        - error
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          additionalProperties: true
      required:
        - success
        - data
    TokenItem:
      type: object
      properties:
        tokenId:
          type: string
        accessToken:
          type: string
        name:
          type: string
        role:
          type: integer
        createdAt:
          type: integer
        namespace:
          type: string
        tags:
          type: array
          items:
            type: string
        lastUsed:
          type: integer
        expiresAt:
          type: integer
        rateLimit:
          type: integer
        permissions:
          type: array
          items:
            type: object
      required:
        - tokenId
    TokenList:
      type: object
      properties:
        tokens:
          type: array
          items:
            $ref: '#/components/schemas/TokenItem'
      required:
        - tokens
    ProxyInfo:
      type: object
      properties:
        proxyId:
          type: integer
        proxyKey:
          type: string
        proxyName:
          type: string
        createdAt:
          type: integer
        fingerprint:
          type: string
    AuthInitData:
      type: object
      properties:
        accessToken:
          type: string
        proxyId:
          type: integer
        proxyName:
          type: string
        proxyKey:
          type: string
        role:
          type: integer
        userid:
          type: string
