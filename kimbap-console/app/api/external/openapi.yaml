openapi: 3.1.0
info:
  title: "Kimbap Console External API"
  version: "1.0.0"
servers:
  - url: "/api/external"
paths:
  /auth/init:
    post:
      operationId: authInit
      summary: Initialize Proxy and Create Owner Token (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                masterPwd:
                  type: string
              required:
                - masterPwd
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []
  /proxy:
    post:
      operationId: proxyGetPublic
      summary: Get current proxy info (public)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []
  /proxy/update:
    post:
      operationId: proxyUpdate
      summary: Update proxy configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                proxyId:
                  type: integer
                proxyName:
                  type: string
              required:
                - proxyId
                - proxyName
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tokens:
    post:
      operationId: tokensList
      summary: List Tokens
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                namespace:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tokens/get:
    post:
      operationId: tokensGet
      summary: Get Token by ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tokenId:
                  type: string
              required:
                - tokenId
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tokens/create:
    post:
      operationId: tokensCreate
      summary: Batch Create Tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tokens:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      role:
                        type: integer
                      notes:
                        type: string
                      expiresAt:
                        type: integer
                      rateLimit:
                        type: integer
                      namespace:
                        type: string
                      tags:
                        type: array
                        items:
                          type: string
                      permissions:
                        type: array
                        items:
                          type: object
              required:
                - tokens
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tokens/update:
    post:
      operationId: tokensUpdate
      summary: Update Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tokenId:
                  type: string
              required:
