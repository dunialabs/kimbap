      summary: Batch Update Tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tokenIds:
                  type: array
                  items:
                    type: string
                permissions:
                  type: array
                  items:
                    type: object
                namespace:
                  type: string
                tags:
