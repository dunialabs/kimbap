      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tokens/delete:
    post:
      operationId: tokensDelete
      summary: Delete Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
