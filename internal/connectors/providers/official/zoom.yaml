id: zoom
display_name: Zoom
supported_flows: [browser]
auth_endpoint: https://zoom.us/oauth/authorize
token_endpoint: https://zoom.us/oauth/token
revocation_endpoint: https://zoom.us/oauth/revoke
user_info_endpoint: https://api.zoom.us/v2/users/me
default_scopes:
  - meeting:read:admin
  - meeting:write:admin
  - recording:read:admin
scope_presets:
  minimal: "meeting:read:admin"
  meetings: "meeting:read:admin meeting:write:admin"
  recordings: "meeting:read:admin recording:read:admin"
  default: "meeting:read:admin meeting:write:admin recording:read:admin"
connection_scope_model: [user]
pkce_required: false
notes: "Zoom OAuth is configured for browser flow; start with BYO lane and provide app credentials from your Zoom OAuth app."
auth_lanes: [byo]
token_exchange:
  auth_method: body
