id: zendesk
display_name: Zendesk
supported_flows: [browser]
auth_endpoint: "https://{subdomain}.zendesk.com/oauth/authorizations/new"
token_endpoint: "https://{subdomain}.zendesk.com/oauth/tokens"
default_scopes:
  - read
scope_presets:
  readonly: "read"
  readwrite: "read write"
connection_scope_model: [workspace]
pkce_required: false
notes: "Zendesk requires a subdomain in the OAuth endpoints. Use --extra subdomain=<your-subdomain> when connecting."
auth_lanes: [byo]
endpoint_placeholders: [subdomain]
token_exchange:
  auth_method: body
