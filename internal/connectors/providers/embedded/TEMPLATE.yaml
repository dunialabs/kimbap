# Provider Manifest Template
# Copy this file to {provider-id}.yaml and fill in all required fields.
# Required fields: id, display_name, supported_flows, auth_endpoint, token_endpoint, auth_lanes

id: your-provider
display_name: Your Provider
supported_flows:
  - browser  # Use device for CLI-friendly OAuth (no browser redirect)
  # - device
auth_endpoint: https://your-provider.com/oauth/authorize
token_endpoint: https://your-provider.com/oauth/token
# device_endpoint: https://your-provider.com/oauth/device  # Required if device flow
# revocation_endpoint: https://your-provider.com/oauth/revoke
# user_info_endpoint: https://your-provider.com/userinfo
default_scopes:
  - read
scope_presets:
  readonly: read
  readwrite: read write
connection_scope_model:
  - user  # or workspace, service
pkce_required: false
notes: ""

# Auth Lanes — Choose which lanes to support:
#   public-client: embed client_id (no secret, device/PKCE flow only)
#   managed-confidential: platform manages the app (client_secret in vault)
#   byo: user provides their own client_id + client_secret via env vars
auth_lanes:
  - byo  # minimum; add public-client or managed-confidential as needed

# Only for public-client lane — safe to commit, not a secret
# embedded_client_id: ""

# Only for managed-confidential lane — safe to commit (secret is in vault)
# managed_client_id: ""

# Token exchange auth method: body (default), basic, header
token_exchange:
  auth_method: body

# For providers with dynamic URL placeholders (e.g. Zendesk subdomain)
# endpoint_placeholders:
#   - subdomain
