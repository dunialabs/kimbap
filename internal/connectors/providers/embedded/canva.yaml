id: canva
display_name: Canva
supported_flows: [browser]
auth_endpoint: https://www.canva.com/api/oauth/authorize
token_endpoint: https://api.canva.com/rest/v1/oauth/token
revocation_endpoint: https://api.canva.com/rest/v1/oauth/revoke
user_info_endpoint: https://api.canva.com/rest/v1/users/me
default_scopes:
  - "design:content:read"
scope_presets:
  readonly: "design:content:read"
  readwrite: "design:content:read design:content:write"
connection_scope_model: [user]
pkce_required: true
auth_lanes: [byo]
token_exchange:
  auth_method: body
