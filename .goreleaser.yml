version: 2

project_name: kimbap

before:
  hooks:
    - go mod tidy

builds:
  - id: kimbap
    main: ./cmd/kimbap
    binary: kimbap
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/dunialabs/kimbap/internal/config.version={{.Version}} -X github.com/dunialabs/kimbap/internal/config.commit={{.Commit}} -X github.com/dunialabs/kimbap/internal/config.date={{.Date}}

archives:
  - id: default
    builds:
      - kimbap
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: packages
    package_name: kimbap
    vendor: Dunia Labs
    homepage: https://kimbap.sh
    maintainer: Dunia Labs <hello@dunialabs.io>
    description: Secure action runtime for AI agents
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: ./README.md
        dst: /usr/share/doc/kimbap/README.md

checksum:
  name_template: "checksums.txt"

brews:
  - name: kimbap
    ids:
      - default
    homepage: https://kimbap.sh
    description: Secure action runtime for AI agents
    license: MIT
    directory: Formula
    repository:
      owner: dunialabs
      name: homebrew-kimbap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: kimbap-bot
      email: hello@dunialabs.io
    install: |
      bin.install "kimbap"
      bin.install_symlink "kimbap" => "kb"
    test: |
      system "#{bin}/kimbap", "--version"
    skip_upload: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: dunialabs
    name: kimbap
