services:
  kimbap:
    build: .
    container_name: kimbap
    restart: unless-stopped
    environment:
      KIMBAP_LISTEN_ADDR: ":8080"
      KIMBAP_DATA_DIR: /data/kimbap
      KIMBAP_MASTER_KEY_HEX: ${KIMBAP_MASTER_KEY_HEX:-}
      KIMBAP_LOG_LEVEL: ${KIMBAP_LOG_LEVEL:-info}
    ports:
      - '${KIMBAP_PORT:-8080}:8080'
    volumes:
      - kimbap_data:/data/kimbap
    networks:
      - kimbap-network

  # Postgres is optional. kimbap uses SQLite by default.
  # Uncomment for multi-instance/connected mode with a shared DB.
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: kimbap-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: kimbap
  #     POSTGRES_PASSWORD: kimbap123
  #     POSTGRES_DB: kimbap_db
  #   ports:
  #     - '${KIMBAP_POSTGRES_PORT:-5433}:5432'
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - kimbap-network

volumes:
  kimbap_data:
    driver: local
  # postgres_data:
  #   driver: local

networks:
  kimbap-network:
    driver: bridge
