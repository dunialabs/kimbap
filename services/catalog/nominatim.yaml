name: nominatim
version: 1.0.0
description: OpenStreetMap Nominatim API for geocoding, reverse geocoding, and location lookup
base_url: https://nominatim.openstreetmap.org
auth:
  type: none
triggers:
  task_verbs: [geocode, search, find, locate, reverse]
  objects: [addresses, locations, coordinates]
  instead_of:
    - calling Nominatim APIs directly without usage-policy-safe request shaping
  exclusions:
    - unrelated actions outside geocoding and reverse geocoding
gotchas:
  - symptom: Requests are denied with 403 despite valid query
    likely_cause: Missing required User-Agent header
    recovery: Always send a descriptive User-Agent header on requests
    severity: high
  - symptom: Burst queries start returning 429 errors
    likely_cause: Nominatim public rate limit exceeded (about 1 request/second)
    recovery: Throttle requests and queue geocoding calls to respect rate limits
    severity: high
  - symptom: lookup results are empty for known OSM entities
    likely_cause: osm_ids format is invalid
    recovery: Use prefixed IDs like R123, W456, or N789 as required
    severity: medium
  - symptom: Reverse geocode result does not exactly match clicked point
    likely_cause: Endpoint returns nearest known address/road feature
    recovery: Treat reverse output as nearest address approximation, not exact parcel identity
    severity: low
recipes:
  - name: Address to coordinates
    description: Convert a full address string into usable latitude/longitude coordinates
    steps:
      - Search using the full address query
      - Select the best match from returned candidates
      - Use lat/lon from the first valid result for downstream mapping
actions:
  search:
    method: GET
    path: /search
    description: Search for a location by name or address
    args:
      - name: q
        type: string
        required: true
      - name: limit
        type: integer
        required: false
        default: 5
      - name: address_details
        type: integer
        required: false
        default: 0
      - name: country_codes
        type: string
        required: false
    request:
      query:
        q: "{q}"
        format: "json"
        limit: "{limit}"
        addressdetails: "{address_details}"
        countrycodes: "{country_codes}"
      headers:
        User-Agent: "Kimbap/1.0 (https://kimbap.sh)"
        Accept: application/json
    response:
      type: array
      filter:
        select:
          display_name: display_name
          lat: lat
          lon: lon
          type: type
          address: address
        max_items: 5
        drop_nulls: true
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 500
      retry_on: [429, 500, 502, 503]
  reverse:
    method: GET
    path: /reverse
    description: Reverse geocode coordinates to an address
    args:
      - name: lat
        type: number
        required: true
      - name: lon
        type: number
        required: true
    request:
      query:
        lat: "{lat}"
        lon: "{lon}"
        format: "json"
        addressdetails: "1"
      headers:
        User-Agent: "Kimbap/1.0 (https://kimbap.sh)"
        Accept: application/json
    response:
      type: object
      filter:
        select:
          display_name: display_name
          lat: lat
          lon: lon
          type: type
          address: address
        drop_nulls: true
    risk:
      level: low
  lookup:
    method: GET
    path: /lookup
    description: Look up specific OSM objects by their IDs
    args:
      - name: osm_ids
        type: string
        required: true
    request:
      query:
        osm_ids: "{osm_ids}"
        format: "json"
      headers:
        User-Agent: "Kimbap/1.0 (https://kimbap.sh)"
        Accept: application/json
    response:
      type: array
      filter:
        select:
          display_name: display_name
          lat: lat
          lon: lon
          type: type
          address: address
        max_items: 10
        drop_nulls: true
    risk:
      level: low
