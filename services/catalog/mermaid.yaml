name: mermaid
version: 1.0.0
description: Mermaid diagram creation and rendering via Mermaid CLI harness
adapter: command
command_spec:
  executable: mermaid
  json_flag: "--json"
  timeout: "30s"
auth:
  type: none
triggers:
  task_verbs: [create, validate, render, share]
  objects: [mermaid diagrams, diagram definitions, render links]
  instead_of:
    - manually composing Mermaid payloads and renderer URLs
  exclusions:
    - editing non-Mermaid diagram tools
gotchas:
  - symptom: create-diagram fails with parser errors
    likely_cause: Mermaid definition syntax is invalid for selected diagram type
    recovery: Validate syntax first and fix node/edge declarations before create
    severity: high
  - symptom: render-url returns unsupported format errors
    likely_cause: Requested format is not accepted by the harness for this diagram
    recovery: Retry with svg or png and confirm diagram_id exists
    severity: medium
recipes:
  - name: Draft to shareable diagram flow
    description: Create, validate, and publish a Mermaid diagram URL safely
    steps:
      - Call validate with the full diagram definition
      - Call create-diagram with type and validated definition
      - Call render-url to obtain an SVG preview link
      - Call share to generate a shareable artifact
actions:
  create-diagram:
    command: "diagram create"
    description: Create a Mermaid diagram from a definition
    idempotent: false
    args:
      - name: type
        type: string
        required: true
      - name: definition
        type: string
        required: true
      - name: title
        type: string
        required: false
    response:
      type: object
    risk:
      level: medium

  validate:
    command: "diagram validate"
    description: Validate Mermaid definition syntax and structure
    idempotent: true
    args:
      - name: definition
        type: string
        required: true
    response:
      type: object
    risk:
      level: low

  render-url:
    command: "render url"
    description: Generate a rendered diagram URL for a saved diagram
    idempotent: true
    args:
      - name: diagram_id
        type: string
        required: true
      - name: format
        type: string
        required: false
        default: svg
    response:
      type: object
    risk:
      level: low

  share:
    command: "share create"
    description: Create a share entry for an existing diagram
    idempotent: false
    args:
      - name: diagram_id
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
