name: mermaid
version: 1.0.0
description: Render Mermaid diagram files to images via the Mermaid CLI (mmdc)
adapter: command
command_spec:
  executable: mmdc
  json_flag: off
  timeout: "30s"
auth:
  type: none
triggers:
  task_verbs: [render, convert]
  objects: [mermaid diagram files, diagram images]
  instead_of:
    - manually running mmdc commands to render diagrams
  exclusions:
    - editing non-Mermaid diagram tools
gotchas:
  - symptom: render fails with parser errors
    likely_cause: Mermaid definition syntax is invalid for the diagram type
    recovery: Check syntax against Mermaid docs before rendering
    severity: high
  - symptom: mmdc command not found
    likely_cause: Mermaid CLI is not installed
    recovery: Install via npm install -g @mermaid-js/mermaid-cli
    severity: high
recipes:
  - name: Render a diagram file to SVG
    description: Render a Mermaid source file to an SVG output file
    steps:
      - Call render with an input file path and an output path ending in .svg
actions:
  render:
    command: "--quiet"
    description: Render a Mermaid diagram source file to an image file.
    idempotent: true
    args:
      - name: input
        type: string
        required: true
      - name: output
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
