name: wikipedia
version: 1.0.0
description: Wikipedia REST API for article summaries, search, and historical events
base_url: https://en.wikipedia.org/api/rest_v1
auth:
  type: none
triggers:
  task_verbs: [search, look up, find, read, summarize]
  objects: [articles, pages, topics, facts]
  instead_of:
    - calling Wikipedia APIs directly with raw title/path guessing
  exclusions:
    - unrelated actions outside encyclopedic lookup and summaries
gotchas:
  - symptom: get-summary returns 404 for seemingly valid topic
    likely_cause: Requested title is a disambiguation page rather than a concrete article
    recovery: Use search first and retry with a more specific page title
    severity: common
  - symptom: Summary lookup misses expected article
    likely_cause: Title casing/format mismatch, including underscore vs space conventions
    recovery: Use canonical title from search results and encode spaces as underscores
    severity: medium
  - symptom: on-this-day queries return empty/error for selected date
    likely_cause: Requested date is in the future
    recovery: Use historical dates only for on-this-day endpoints
    severity: low
recipes:
  - name: Topic research lookup
    description: Find the best-matching page for a keyword and retrieve concise summary content
    steps:
      - Search Wikipedia with the target keyword
      - Select the top relevant title from results
      - Get-summary for that title to produce a concise briefing
actions:
  get-summary:
    method: GET
    path: /page/summary/{title}
    description: Get a summary of a Wikipedia article by title
    args:
      - name: title
        type: string
        required: true
    request:
      path_params:
        title: "{title}"
    response:
      type: object
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 200
      retry_on: [429, 500, 502, 503]
  search:
    method: GET
    path: /page/search
    description: Search Wikipedia pages by query
    args:
      - name: q
        type: string
        required: true
      - name: limit
        type: integer
        required: false
        default: 5
    request:
      query:
        q: "{q}"
        limit: "{limit}"
    response:
      extract: pages
      type: array
    risk:
      level: low
  get-on-this-day:
    method: GET
    path: /feed/onthisday/events/{MM}/{DD}
    description: Get historical events that happened on a given month and day
    args:
      - name: MM
        type: string
        required: true
      - name: DD
        type: string
        required: true
    request:
      path_params:
        MM: "{MM}"
        DD: "{DD}"
    response:
      type: object
    risk:
      level: low
