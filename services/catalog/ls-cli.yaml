name: ls-cli
version: 1.0.0
description: Directory listing with compact output
adapter: command
command_spec:
  executable: ls
  json_flag: "none"
auth:
  type: none
triggers:
  task_verbs: [list, inspect]
  objects: [directories, files, folder contents]
  instead_of:
    - running ls directly without output filtering
  exclusions:
    - recursive directory tree visualization
actions:
  list:
    command: "-la"
    description: List directory contents in long format
    args:
      - name: path
        type: string
        required: false
        style: positional
    idempotent: true
    response:
      type: object
      text_filter:
        max_lines: 50
    risk:
      level: low
