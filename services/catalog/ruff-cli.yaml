name: ruff-cli
version: 1.0.0
description: Python linter and formatter
adapter: command
command_spec:
  executable: ruff
  json_flag: "none"
auth:
  type: none
triggers:
  task_verbs: [lint, check, format]
  objects: [python, lint errors, formatting]
actions:
  check:
    command: "check --output-format json"
    description: Run Ruff linter with JSON output
    args:
      - name: path
        type: string
        required: false
        style: positional
        default: "."
    response:
      type: object
    risk:
      level: low
  format-check:
    command: "format --check"
    description: Check Python formatting
    args:
      - name: path
        type: string
        required: false
        style: positional
    response:
      type: object
      text_filter:
        max_lines: 30
    risk:
      level: low
