name: spotify
version: 1.0.0
description: Spotify playback control via AppleScript (macOS only)
adapter: applescript
target_app: Spotify
auth:
  type: none
triggers:
  task_verbs: [play, pause, skip, inspect, search, control]
  objects: [music, track, playback, volume]
  instead_of:
    - manually controlling Spotify UI for routine playback actions
  exclusions:
    - non-Spotify audio players
gotchas:
  - symptom: Command fails with automation permission or access errors
    likely_cause: macOS Automation permission for Spotify was not granted
    recovery: Grant terminal/agent automation access to Spotify in System Settings > Privacy & Security > Automation
    severity: high
  - symptom: search-play fails with "Message not understood" or unsupported search errors
    likely_cause: Spotify AppleScript does not support free-text search playback APIs
    recovery: Use spotify URI playback via spotify.play-uri or pass a spotify:track URI to search-play
    severity: medium
recipes:
  - name: Resume and inspect current playback
    description: Start playback and confirm current track metadata
    steps:
      - Run spotify.play to resume playback
      - Run spotify.get-current-track to confirm track name and artist
  - name: Play an exact track URI
    description: Start playback using a Spotify URI for deterministic results
    steps:
      - Run spotify.play-uri with spotify:track:<id>
      - Run spotify.get-player-state to verify playback is active
actions:
  get-current-track:
    command: spotify-get-current-track
    description: Get metadata for the current track and playback position
    idempotent: true
    args: []
    response:
      type: object
    risk:
      level: low
  play:
    command: spotify-play
    description: Start or resume Spotify playback
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: low
  pause:
    command: spotify-pause
    description: Pause Spotify playback
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: low
  next-track:
    command: spotify-next-track
    description: Skip to the next track
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  previous-track:
    command: spotify-previous-track
    description: Return to the previous track
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  set-volume:
    command: spotify-set-volume
    description: Set Spotify player volume from 0 to 100
    idempotent: false
    args:
      - name: volume
        type: integer
        required: true
    response:
      type: object
    risk:
      level: medium
  get-player-state:
    command: spotify-get-player-state
    description: Get player state, current volume, and playback position
    idempotent: true
    args: []
    response:
      type: object
    risk:
      level: low
  search-play:
    command: spotify-search-play
    description: Start playback from a Spotify URI passed via query (legacy compatibility)
    idempotent: false
    args:
      - name: query
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  play-uri:
    command: spotify-play-uri
    description: Start playback for an exact Spotify URI (spotify:track:..., spotify:playlist:...)
    idempotent: false
    args:
      - name: uri
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
