name: prettier-cli
version: 1.0.0
description: Code formatter checker
adapter: command
command_spec:
  executable: npx
  json_flag: "none"
  success_codes: [0, 1]
auth:
  type: none
triggers:
  task_verbs: [check, format]
  objects: [formatting, code style, prettier]
actions:
  check:
    command: "prettier --check"
    description: Check if files are formatted
    args:
      - name: path
        type: string
        required: false
        style: positional
        default: "."
    response:
      type: object
      text_filter:
        keep_lines_matching: ["\\[warn\\]", "checking"]
        max_lines: 30
    risk:
      level: low
