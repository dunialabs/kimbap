name: next-cli
version: 1.0.0
description: Next.js build and development CLI
adapter: command
command_spec:
  executable: npx
  json_flag: "none"
auth:
  type: none
triggers:
  task_verbs: [build, check, run]
  objects: [builds, routes, pages]
actions:
  build:
    command: "next build"
    description: Build Next.js application
    response:
      type: object
      text_filter:
        strip_lines_matching: ["^\\s*$", "^info"]
        keep_lines_matching: ["Route", "Size", "First Load", "error", "Error"]
        max_lines: 50
    risk:
      level: low
  lint:
    command: "next lint"
    description: Run Next.js linter
    response:
      type: object
      text_filter:
        max_lines: 30
    risk:
      level: low
