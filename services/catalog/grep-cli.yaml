name: grep-cli
version: 1.0.0
description: Text search in files
adapter: command
command_spec:
  executable: grep
  json_flag: "none"
  success_codes: [0, 1]
auth:
  type: none
triggers:
  task_verbs: [search, find, match]
  objects: [text patterns, file contents, matches]
  instead_of:
    - running grep directly without output limits
  exclusions:
    - file name search without content matching
actions:
  search:
    command: "-rn"
    description: Recursive search with line numbers
    args:
      - name: pattern
        type: string
        required: true
        style: positional
      - name: path
        type: string
        required: false
        style: positional
      - name: include
        type: string
        required: false
    idempotent: true
    response:
      type: object
      text_filter:
        max_lines: 50
        strip_ansi: true
    risk:
      level: low
