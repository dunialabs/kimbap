name: brave-search
version: 1.0.0
description: Brave Search API for web and news search results
base_url: https://api.search.brave.com
auth:
  type: header
  header_name: X-Subscription-Token
  credential_ref: brave-search.api_key
triggers:
  task_verbs: [search, discover, compare, summarize]
  objects: [web results, news, sources]
  instead_of:
    - ad-hoc browser searching without API-backed retrieval
  exclusions:
    - transactional actions (write/update/delete)
gotchas:
  - symptom: 429 responses from search endpoints
    likely_cause: Rate limits exceeded for current plan or burst traffic
    recovery: Back off using retry policy, reduce request concurrency, and honor retry headers when present
    severity: high
  - symptom: Empty result sets for obvious queries
    likely_cause: Overly narrow query or strict filters (offset/count/freshness)
    recovery: Broaden query terms and relax filters before concluding no results exist
    severity: medium
  - symptom: Results are irrelevant to user locale/language
    likely_cause: country/search_lang parameters do not match user intent
    recovery: Set country and language parameters explicitly to target geography and language
    severity: medium
  - symptom: News freshness filter behaves unexpectedly
    likely_cause: freshness values only accept pd/pw/pm for day/week/month windows
    recovery: Use exact supported freshness tokens (pd, pw, pm) and omit when a broader range is needed
    severity: low
actions:
  web-search:
    method: GET
    path: /res/v1/web/search
    description: Search the web using Brave Search
    args:
      - name: q
        type: string
        required: true
      - name: count
        type: integer
        required: false
        default: 10
      - name: offset
        type: integer
        required: false
        default: 0
      - name: country
        type: string
        required: false
    request:
      query:
        q: "{q}"
        count: "{count}"
        offset: "{offset}"
        country: "{country}"
      headers:
        Accept: application/json
    response:
      extract: web.results
      type: array
      filter:
        select:
          title: title
          url: url
          description: description
        max_items: 10
        drop_nulls: true
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 200
      retry_on: [429, 500, 502, 503]
    pagination:
      type: offset
      max_pages: 5
      next_path: query.next_offset
  news-search:
    method: GET
    path: /res/v1/news/search
    description: Search news articles using Brave Search
    args:
      - name: q
        type: string
        required: true
      - name: count
        type: integer
        required: false
        default: 10
      - name: freshness
        type: string
        required: false
        enum: [pd, pw, pm]
    request:
      query:
        q: "{q}"
        count: "{count}"
        freshness: "{freshness}"
      headers:
        Accept: application/json
    response:
      extract: results
      type: array
      filter:
        select:
          title: title
          url: url
          description: description
        max_items: 10
        drop_nulls: true
    risk:
      level: low
