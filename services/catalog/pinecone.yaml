name: pinecone
version: 1.0.0
description: Pinecone API for vector database index management
base_url: https://api.pinecone.io
auth:
  type: header
  header_name: Api-Key
  credential_ref: pinecone.api_key
triggers:
  task_verbs: [list, create, manage]
  objects: [indexes, collections, vector stores]
  instead_of:
    - calling Pinecone APIs directly with unmanaged index lifecycle operations
  exclusions:
    - unrelated actions outside vector index and collection management
gotchas:
  - symptom: create-index rejected for naming rules
    likely_cause: Index name contains uppercase letters, spaces, or invalid characters
    recovery: Use lowercase alphanumeric names with hyphens only
    severity: common
  - symptom: Queries fail or embeddings mismatch after index creation
    likely_cause: Index dimension does not match embedding model output size
    recovery: Set dimension to the exact embedding size used by your model
    severity: high
  - symptom: Missing vectors after index deletion
    likely_cause: Index deletion is irreversible
    recovery: Require confirmation and backup strategy before delete-index
    severity: high
  - symptom: New index cannot be used immediately
    likely_cause: Provisioning delay (often 30-60 seconds) before ready state
    recovery: Poll get-index/status until ready before querying or writing vectors
    severity: medium
recipes:
  - name: New index readiness workflow
    description: Provision a new index and confirm it is ready before use
    steps:
      - Create index with valid name, dimension, metric, and spec
      - Poll get-index details for readiness status
      - Begin vector operations only after index reports ready
actions:
  list-indexes:
    method: GET
    path: /indexes
    description: List all indexes in the project
    response:
      extract: indexes
      type: array
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 200
      retry_on: [429, 500, 502, 503]
  create-index:
    method: POST
    path: /indexes
    description: Create a new vector index
    args:
      - name: name
        type: string
        required: true
      - name: dimension
        type: integer
        required: true
      - name: metric
        type: string
        required: true
        enum: [cosine, euclidean, dotproduct]
      - name: spec
        type: object
        required: true
    request:
      body:
        name: "{name}"
        dimension: "{dimension}"
        metric: "{metric}"
        spec: "{spec}"
    response:
      type: object
    risk:
      level: high
  get-index:
    method: GET
    path: /indexes/{index_name}
    description: Get details of a specific index
    args:
      - name: index_name
        type: string
        required: true
    request:
      path_params:
        index_name: "{index_name}"
    response:
      type: object
    risk:
      level: low
  delete-index:
    method: DELETE
    path: /indexes/{index_name}
    description: Delete an index and all its data
    warnings:
      - This permanently deletes the index and all stored vectors
    args:
      - name: index_name
        type: string
        required: true
    request:
      path_params:
        index_name: "{index_name}"
    response:
      type: object
    risk:
      level: critical
  list-collections:
    method: GET
    path: /collections
    description: List all collections in the project
    response:
      extract: collections
      type: array
    risk:
      level: low
