name: tree-cli
version: 1.0.0
description: Directory tree visualization
adapter: command
command_spec:
  executable: tree
  json_flag: "none"
auth:
  type: none
triggers:
  task_verbs: [inspect, visualize]
  objects: [directory trees, folder structures]
  instead_of:
    - running tree directly without depth limits
  exclusions:
    - flat file listing
actions:
  show:
    command: "--noreport"
    description: Display directory tree without summary
    args:
      - name: path
        type: string
        required: false
        style: positional
      - name: L
        type: integer
        required: false
    idempotent: true
    response:
      type: object
      text_filter:
        max_lines: 60
    risk:
      level: low
