name: pages
version: 1.0.0
description: Apple Pages automation via AppleScript — document creation, editing, and export on macOS
adapter: applescript
target_app: Pages
auth:
  type: none
triggers:
  task_verbs: [create, open, read, write, export, close]
  objects: [documents, text, reports, files]
  instead_of:
    - manually editing and exporting straightforward Pages documents
  exclusions:
    - advanced layout operations involving complex templates and anchored objects
gotchas:
  - symptom: set-text overwrites unintended content
    likely_cause: Action replaces full active document text rather than a selected region
    recovery: Use pages.get-text first to snapshot current content and only call set-text when full replacement is intended
    severity: high
  - symptom: export-pdf or export-word fails with file/path errors
    likely_cause: output_path is non-absolute, parent folder missing, or write permission denied
    recovery: Provide absolute POSIX output_path and ensure destination directory exists and is writable
    severity: medium
  - symptom: Actions target the wrong document
    likely_cause: Multiple Pages documents are open and frontmost state changed
    recovery: Run open-document on the intended file immediately before read/write/export actions
    severity: common
recipes:
  - name: Update document text then export
    description: Apply deterministic text update and generate deliverable output
    steps:
      - Run pages.open-document for the target file
      - Run pages.get-text, then pages.set-text with the finalized full content
      - Run pages.export-pdf or pages.export-word with an absolute output_path
actions:
  create-document:
    command: pages-create-document
    description: Create a new blank Pages document
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  open-document:
    command: pages-open-document
    description: Open a Pages document from a POSIX file path
    idempotent: false
    args:
      - name: path
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  get-text:
    command: pages-get-text
    description: Get the full text content of the active document
    idempotent: true
    args: []
    response:
      type: object
    risk:
      level: low
  set-text:
    command: pages-set-text
    description: Replace the full text content of the active document
    idempotent: false
    args:
      - name: text
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  export-pdf:
    command: pages-export-pdf
    description: Export the active document as a PDF file
    idempotent: false
    args:
      - name: output_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  export-word:
    command: pages-export-word
    description: Export the active document as a Microsoft Word file
    idempotent: false
    args:
      - name: output_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  close-document:
    command: pages-close-document
    description: Close the active document
    idempotent: false
    args:
      - name: save
        type: boolean
        required: false
        default: false
    response:
      type: object
    risk:
      level: medium
