name: eslint-cli
version: 1.0.0
description: JavaScript and TypeScript linter
adapter: command
command_spec:
  executable: npx
  json_flag: "none"
auth:
  type: none
triggers:
  task_verbs: [lint, check]
  objects: [javascript, typescript, lint errors]
actions:
  check:
    command: "eslint --format json"
    description: Run ESLint with JSON output
    args:
      - name: path
        type: string
        required: false
        style: positional
        default: "."
    response:
      type: object
    risk:
      level: low
