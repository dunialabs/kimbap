name: helm-cli
version: 1.0.0
description: Kubernetes package manager
adapter: command
command_spec:
  executable: helm
  json_flag: "none"
auth:
  type: none
triggers:
  task_verbs: [list, install]
  objects: [helm releases, charts, kubernetes packages]
gotchas:
  - symptom: install fails with release name conflict
    likely_cause: A release with the same name already exists in the namespace
    recovery: Use helm list to check existing releases before installing
    severity: medium
actions:
  list:
    command: "list --output json"
    description: List Helm releases
    idempotent: true
    response:
      type: array
    risk:
      level: low
  install:
    command: "install"
    description: Install a chart
    args:
      - name: name
        type: string
        required: true
        style: positional
      - name: chart
        type: string
        required: true
        style: positional
    response:
      type: object
      text_filter:
        max_lines: 20
    risk:
      level: high
