name: apple-calendar
version: 1.0.0
description: Apple Calendar via AppleScript
adapter: applescript
target_app: Calendar
auth:
  type: none
triggers:
  task_verbs: [list, check, schedule, create, search]
  objects: [calendars, events, meetings, appointments]
  instead_of:
    - manually creating or scanning events in Calendar UI
  exclusions:
    - attendee invitation workflows requiring external server-side validation
gotchas:
  - symptom: create-event fails or creates event at unexpected time
    likely_cause: Date strings are ambiguous or not parseable in the current locale/timezone
    recovery: Use explicit ISO-like datetime values with timezone awareness and verify with list-events
    severity: high
  - symptom: get-event returns the wrong event when titles are reused
    likely_cause: Event titles are not unique across calendars and days
    recovery: Narrow scope by calendar and date range before selecting by title
    severity: medium
  - symptom: list-events misses expected items immediately after creation
    likely_cause: Calendar sync/index updates can lag briefly across accounts
    recovery: Retry list-events with a short backoff and confirm the target calendar account
    severity: low
recipes:
  - name: Safe event creation and verification
    description: Create an event in the intended calendar with deterministic validation
    steps:
      - Run apple-calendar.list-calendars and confirm the exact calendar name
      - Run apple-calendar.create-event with explicit title, start_date, end_date, and calendar
      - Run apple-calendar.list-events for that calendar and date window to verify persistence
actions:
  list-calendars:
    command: list-calendars
    description: List all calendars
    idempotent: true
    args: []
    response:
      type: array
    risk:
      level: low
  list-events:
    command: list-events
    description: List events, optionally filtered by calendar and date range
    idempotent: true
    args:
      - name: calendar
        type: string
        required: false
      - name: start_date
        type: string
        required: false
      - name: end_date
        type: string
        required: false
    response:
      type: array
    risk:
      level: low
  get-event:
    command: get-event
    description: Get event details by title
    idempotent: true
    args:
      - name: title
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  create-event:
    command: create-event
    description: Create a new calendar event
    idempotent: false
    args:
      - name: title
        type: string
        required: true
      - name: start_date
        type: string
        required: true
      - name: end_date
        type: string
        required: true
      - name: calendar
        type: string
        required: false
      - name: location
        type: string
        required: false
      - name: notes
        type: string
        required: false
    response:
      type: object
    risk:
      level: medium
  search-events:
    command: search-events
    description: Search events by keyword
    idempotent: true
    args:
      - name: query
        type: string
        required: true
    response:
      type: array
    risk:
      level: low
