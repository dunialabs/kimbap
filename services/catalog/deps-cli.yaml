name: deps-cli
version: 1.0.0
description: Dependency file viewer for package manifests
adapter: command
command_spec:
  executable: cat
  json_flag: "none"
auth:
  type: none
triggers:
  task_verbs: [read, inspect, view]
  objects: [dependencies, packages, manifests]
actions:
  view:
    command: "--"
    description: View dependency manifest (package.json, Cargo.toml, go.mod, etc.)
    args:
      - name: file
        type: string
        required: true
        style: positional
    idempotent: true
    response:
      type: object
      text_filter:
        max_lines: 30
    risk:
      level: low
