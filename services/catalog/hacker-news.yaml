name: hacker-news
version: 1.0.0
description: Hacker News API for top stories, new stories, and item details
base_url: https://hacker-news.firebaseio.com/v0
auth:
  type: none
triggers:
  task_verbs: [fetch, get, read, browse]
  objects: [stories, comments, items]
  instead_of:
    - calling Hacker News APIs directly with ad-hoc item traversal
  exclusions:
    - unrelated actions outside Hacker News content retrieval
gotchas:
  - symptom: top/new/best responses look incomplete for story details
    likely_cause: Feed endpoints return only item IDs, not full objects
    recovery: Call get-item for each returned ID to retrieve full item payload
    severity: common
  - symptom: get-item returns null or unusable payload for some IDs
    likely_cause: Item was deleted/dead and no longer has full content
    recovery: Skip deleted/dead items and continue with remaining IDs
    severity: medium
  - symptom: Mixed content appears when expecting only stories
    likely_cause: Item types vary (story, job, poll, comment)
    recovery: Filter items by type before downstream processing
    severity: low
recipes:
  - name: Top 5 stories snapshot
    description: Build a concise top-story digest from current feed IDs
    steps:
      - Fetch top story IDs from get-top-stories
      - Take the first five IDs from the returned list
      - Call get-item for each ID and compile the resulting stories
actions:
  get-top-stories:
    method: GET
    path: /topstories.json
    description: Get IDs of the current top stories
    response:
      type: array
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 200
      retry_on: [429, 500, 502, 503]
  get-new-stories:
    method: GET
    path: /newstories.json
    description: Get IDs of the newest stories
    response:
      type: array
    risk:
      level: low
  get-best-stories:
    method: GET
    path: /beststories.json
    description: Get IDs of the best stories
    response:
      type: array
    risk:
      level: low
  get-item:
    method: GET
    path: /item/{id}.json
    description: Get details of a specific item (story, comment, job, poll)
    args:
      - name: id
        type: integer
        required: true
    request:
      path_params:
        id: "{id}"
    response:
      type: object
    risk:
      level: low
