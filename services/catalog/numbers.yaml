name: numbers
version: 1.0.0
description: Apple Numbers automation via AppleScript — spreadsheet and cell operations on macOS
adapter: applescript
target_app: Numbers
auth:
  type: none
triggers:
  task_verbs: [create, open, read, write, update, export]
  objects: [spreadsheets, sheets, cells, tables]
  instead_of:
    - manually entering or checking small sets of spreadsheet values in Numbers
  exclusions:
    - large-scale ETL/data transformation better handled by code/data tools
gotchas:
  - symptom: read-cell or write-cell fails for valid-looking address
    likely_cause: Target sheet/table context differs from assumptions; A1 reference resolves in another table
    recovery: Specify sheet_name explicitly and verify table/sheet structure before cell operations
    severity: high
  - symptom: write-cell stores numbers/dates as plain text
    likely_cause: Value is passed as string and table cell formatting coerces unexpectedly
    recovery: Verify cell format in Numbers and normalize value representations before writing
    severity: medium
  - symptom: export-pdf fails or produces stale content
    likely_cause: Spreadsheet edits not committed yet or destination path invalid
    recovery: Ensure writes complete, then export to an absolute writable output_path
    severity: common
recipes:
  - name: Update specific cell and verify result
    description: Perform targeted spreadsheet mutation with immediate validation
    steps:
      - Run numbers.open-spreadsheet on the target file
      - Run numbers.write-cell with explicit cell and sheet_name
      - Run numbers.read-cell on the same address to confirm persisted value
actions:
  create-spreadsheet:
    command: numbers-create-spreadsheet
    description: Create a new blank Numbers spreadsheet
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  open-spreadsheet:
    command: numbers-open-spreadsheet
    description: Open a Numbers spreadsheet from a POSIX file path
    idempotent: false
    args:
      - name: path
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  read-cell:
    command: numbers-read-cell
    description: Read the value of a single cell in the active spreadsheet
    idempotent: true
    args:
      - name: cell
        type: string
        required: true
      - name: sheet_name
        type: string
        required: false
    response:
      type: object
    risk:
      level: low
  write-cell:
    command: numbers-write-cell
    description: Write a value to a single cell in the active spreadsheet
    idempotent: false
    args:
      - name: cell
        type: string
        required: true
      - name: value
        type: string
        required: true
      - name: sheet_name
        type: string
        required: false
    response:
      type: object
    risk:
      level: medium
  export-pdf:
    command: numbers-export-pdf
    description: Export the active spreadsheet as a PDF file
    idempotent: false
    args:
      - name: output_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  close-spreadsheet:
    command: numbers-close-spreadsheet
    description: Close the active spreadsheet
    idempotent: false
    args:
      - name: save
        type: boolean
        required: false
        default: false
    response:
      type: object
    risk:
      level: medium
