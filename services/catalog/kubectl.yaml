name: kubectl
version: 1.0.0
description: Kubernetes cluster management CLI
adapter: command
command_spec:
  executable: kubectl
  json_flag: "-o json"
  env_passthrough: ["KUBECONFIG", "KUBECTL_*"]
auth:
  type: none
triggers:
  task_verbs: [list, inspect, manage]
  objects: [pods, services, deployments, nodes, logs]
  instead_of:
    - running kubectl commands directly without output filtering
  exclusions:
    - non-Kubernetes container orchestrators
actions:
  get-pods:
    command: "get pods"
    description: List pods in the current namespace
    args:
      - name: namespace
        type: string
        required: false
      - name: all_namespaces
        type: boolean
        required: false
        style: boolean
    idempotent: true
    response:
      type: object
      filter:
        select:
          items: items
        drop_nulls: true
    risk:
      level: low
  get-services:
    command: "get services"
    description: List services in the current namespace
    idempotent: true
    response:
      type: object
    risk:
      level: low
  get-deployments:
    command: "get deployments"
    description: List deployments in the current namespace
    idempotent: true
    response:
      type: object
    risk:
      level: low
  logs:
    command: "logs"
    description: Fetch pod logs
    json_flag: "none"
    args:
      - name: pod
        type: string
        required: true
        style: positional
      - name: container
        type: string
        required: false
      - name: tail
        type: string
        required: false
        default: "100"
    idempotent: true
    response:
      type: object
      text_filter:
        dedup: true
        max_lines: 100
    risk:
      level: low
  describe:
    command: "describe"
    description: Show details of a resource
    json_flag: "none"
    args:
      - name: resource_type
        type: string
        required: true
        style: positional
      - name: resource_name
        type: string
        required: true
        style: positional
    idempotent: true
    response:
      type: object
      text_filter:
        max_lines: 80
    risk:
      level: low
  get-nodes:
    command: "get nodes"
    description: List cluster nodes
    idempotent: true
    response:
      type: object
    risk:
      level: low
