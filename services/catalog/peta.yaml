name: peta
version: 2.0.0
description: PETA Console External REST API for token, tool, approval, policy, cache, and proxy operations
base_url: http://localhost:3000/api/external
auth:
  type: bearer
  credential_ref: peta.token
triggers:
  task_verbs: [list, create, update, delete, approve, reject, manage, enable, disable, start, connect, configure, purge, check, initialize]
  objects: [tokens, policies, approvals, tools, capabilities, proxy, sessions, scopes, templates, cache, ip-whitelist, user-servers, peta-core]
  instead_of:
    - manually using the PETA Console UI for token, tool, or approval operations
    - issuing raw curl requests against PETA Console external endpoints
  exclusions:
    - direct database mutations
    - workflows unrelated to PETA Console
gotchas:
  - symptom: All API calls return 401 or 403
    likely_cause: Missing/invalid owner token for external API
    recovery: Set a valid owner token with kimbap vault set peta.token
    severity: high
  - symptom: init fails with E3007
    likely_cause: Proxy was already initialized
    recovery: Reuse existing owner token; do not call init on initialized instances
    severity: high
  - symptom: enable/disable/start tool fails with E2004
    likely_cause: Invalid masterPwd
    recovery: Use the same masterPwd used at init
    severity: high
  - symptom: decide-approval fails validation
    likely_cause: Invalid decision casing
    recovery: Use exactly APPROVED or REJECTED
    severity: medium
recipes:
  - name: Bootstrap fresh console
    description: Initialize proxy, store owner token, verify core connectivity
    steps:
      - Call init with masterPwd
      - Store returned accessToken in peta.token
      - Call get-peta-core-status
      - Call get-proxy
  - name: Process pending approvals
    description: Review and decide approval queue
    steps:
      - Call count-pending-approvals
      - Call list-approvals with status=pending
      - Call get-approval by id
      - Call decide-approval with APPROVED or REJECTED
actions:
  init:
    method: POST
    path: /auth/init
    description: Initialize PETA Console and create owner token
    auth:
      type: none
    args:
      - name: masterPwd
        type: string
        required: true
    request:
      body:
        masterPwd: "{masterPwd}"
    response:
      type: object
    risk:
      level: high
    idempotent: false
  get-proxy:
    method: POST
    path: /proxy
    description: Get proxy information
    args: []
    request:
      body: {}
    response:
      type: object
    risk:
      level: low
    idempotent: true
  update-proxy:
    method: POST
    path: /proxy/update
    description: Update proxy name
    args:
      - name: proxyId
        type: integer
        required: true
      - name: proxyName
        type: string
        required: true
    request:
      body:
        proxyId: "{proxyId}"
        proxyName: "{proxyName}"
    response:
      type: object
    risk:
      level: medium
    idempotent: false
  get-peta-core-status:
    method: POST
    path: /peta-core/connect
    description: Get PETA Core connection information
    args: []
    request:
      body: {}
    response:
      type: object
    risk:
      level: low
    idempotent: true
  list-tokens:
    method: POST
    path: /tokens
    description: List tokens with optional namespace/tags filters
    args:
      - name: namespace
        type: string
        required: false
      - name: tags
        type: array
        required: false
    request:
      body:
        namespace: "{namespace}"
        tags: "{tags}"
    response:
      extract: data.tokens
      type: array
      filter:
        select:
          id: id
          name: name
          role: role
          namespace: namespace
          tags: tags
          lastUsedAt: lastUsedAt
          createdAt: createdAt
        max_items: 25
        drop_nulls: true
    risk:
      level: low
    idempotent: true
  create-token:
    method: POST
    path: /tokens/create
    description: Create one or more access tokens
    args:
      - name: tokens
        type: array
        required: true
    request:
      body:
        tokens: "{tokens}"
    response:
      type: object
    risk:
      level: high
    idempotent: false
  update-token:
    method: POST
    path: /tokens/update
    description: Update token metadata and permissions
    args:
      - name: tokenId
        type: string
        required: true
      - name: name
        type: string
        required: false
      - name: notes
        type: string
        required: false
      - name: permissions
        type: array
        required: false
      - name: namespace
        type: string
        required: false
      - name: tags
        type: array
        required: false
    request:
      body:
        tokenId: "{tokenId}"
        name: "{name}"
        notes: "{notes}"
        permissions: "{permissions}"
        namespace: "{namespace}"
        tags: "{tags}"
    response:
      type: object
    risk:
      level: high
    idempotent: false
  delete-token:
    method: POST
    path: /tokens/delete
    description: Delete an access token
    args:
      - name: tokenId
        type: string
        required: true
    request:
      body:
        tokenId: "{tokenId}"
    response:
      type: object
    risk:
      level: high
    idempotent: false
  list-tools:
    method: POST
    path: /tools
    description: List configured tools
    args:
      - name: enabled
        type: boolean
        required: false
    request:
      body:
        enabled: "{enabled}"
    response:
      extract: data.tools
      type: array
      filter:
        select:
          toolId: toolId
          name: name
          isEnabled: isEnabled
          isStarted: isStarted
          toolTmplId: toolTmplId
          runningState: runningState
        max_items: 25
        drop_nulls: true
    risk:
      level: low
    idempotent: true
  get-tool:
    method: POST
    path: /tools/get
    description: Get tool details by id
    args:
      - name: toolId
        type: string
        required: true
    request:
      body:
        toolId: "{toolId}"
    response:
      type: object
    risk:
      level: low
    idempotent: true
  start-tool:
    method: POST
    path: /tools/start
    description: Start a tool
    args:
      - name: toolId
        type: string
        required: true
      - name: masterPwd
        type: string
        required: true
    request:
      body:
        toolId: "{toolId}"
        masterPwd: "{masterPwd}"
    response:
      type: object
    risk:
      level: high
    idempotent: false
  enable-tool:
    method: POST
    path: /tools/enable
    description: Enable and start a tool
    args:
      - name: toolId
        type: string
        required: true
      - name: masterPwd
        type: string
        required: true
    request:
      body:
        toolId: "{toolId}"
        masterPwd: "{masterPwd}"
    response:
      type: object
    risk:
      level: high
    idempotent: false
  disable-tool:
    method: POST
    path: /tools/disable
    description: Disable and stop a tool
    args:
      - name: toolId
        type: string
        required: true
      - name: masterPwd
        type: string
        required: true
    request:
      body:
        toolId: "{toolId}"
        masterPwd: "{masterPwd}"
    response:
      type: object
    risk:
      level: high
    idempotent: false
  list-approvals:
    method: POST
    path: /approvals
    description: List approval requests
    args:
      - name: userId
        type: string
        required: false
      - name: serverId
        type: string
        required: false
      - name: toolName
        type: string
        required: false
      - name: status
        type: string
        required: false
      - name: page
        type: integer
        required: false
      - name: pageSize
        type: integer
        required: false
    request:
      body:
        userId: "{userId}"
        serverId: "{serverId}"
        toolName: "{toolName}"
        status: "{status}"
        page: "{page}"
        pageSize: "{pageSize}"
    response:
      extract: data.requests
      type: array
      filter:
        select:
          id: id
          userId: userId
          serverId: serverId
          toolName: toolName
          status: status
          createdAt: createdAt
        max_items: 25
        drop_nulls: true
    risk:
      level: low
    idempotent: true
  get-approval:
    method: POST
    path: /approvals/get
    description: Get one approval request by id
    args:
      - name: id
        type: string
        required: true
    request:
      body:
        id: "{id}"
    response:
      type: object
    risk:
      level: low
    idempotent: true
  decide-approval:
    method: POST
    path: /approvals/decide
    description: Approve or reject an approval request
    args:
      - name: id
        type: string
        required: true
      - name: decision
        type: string
        required: true
        enum: [APPROVED, REJECTED]
      - name: reason
        type: string
        required: false
    request:
      body:
        id: "{id}"
        decision: "{decision}"
        reason: "{reason}"
    response:
      type: object
    risk:
      level: high
    idempotent: false
  count-pending-approvals:
    method: POST
    path: /approvals/count-pending
    description: Count pending approvals
    args:
      - name: userId
        type: string
        required: false
    request:
      body:
        userId: "{userId}"
    response:
      type: object
    risk:
      level: low
    idempotent: true
  list-policies:
    method: POST
    path: /policies
    description: List policy sets
    args:
      - name: serverId
        type: string
        required: false
    request:
      body:
        serverId: "{serverId}"
    response:
      extract: data.policySets
      type: array
      filter:
        select:
          id: id
          serverId: serverId
          status: status
          createdAt: createdAt
          updatedAt: updatedAt
        max_items: 25
        drop_nulls: true
    risk:
      level: low
    idempotent: true
  get-effective-policies:
    method: POST
