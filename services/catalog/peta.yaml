    description: Remove user server configuration
    args:
      - name: userId
        type: string
        required: true
      - name: serverId
        type: string
        required: true
    request:
      body:
        userId: "{userId}"
        serverId: "{serverId}"
    response:
      type: object
    risk:
      level: high
    idempotent: true
  list-sessions:
    method: POST
    path: /sessions
    description: List active sessions
