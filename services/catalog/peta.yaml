    response:
      type: object
    risk:
      level: low
    idempotent: true
  purge-cache:
    method: POST
    path: /cache/purge
    description: Purge result cache by scope
    args:
      - name: scope
        type: string
        required: true
        enum: [global, server, tool, prompt, resource, exact]
      - name: serverId
        type: string
        required: false
      - name: toolName
        type: string
        required: false
      - name: promptName
        type: string
        required: false
      - name: uri
        type: string
        required: false
      - name: reason
        type: string
        required: false
      - name: operation
        type: string
        required: false
      - name: entityId
        type: string
        required: false
      - name: policy
        type: object
        required: false
      - name: scopeContext
        type: object
        required: false
      - name: requestParams
        type: object
        required: false
    request:
      body:
        scope: "{scope}"
        serverId: "{serverId}"
        toolName: "{toolName}"
        promptName: "{promptName}"
        uri: "{uri}"
        reason: "{reason}"
        operation: "{operation}"
        entityId: "{entityId}"
        policy: "{policy}"
        scopeContext: "{scopeContext}"
        requestParams: "{requestParams}"
    response:
      type: object
    risk:
      level: high
    idempotent: false
  get-token:
    method: POST
    path: /tokens/get
    description: Get one token by tokenId
    args:
      - name: tokenId
        type: string
        required: true
    request:
      body:
        tokenId: "{tokenId}"
    response:
      type: object
    risk:
      level: low
    idempotent: true
  batch-update-tokens:
    method: POST
    path: /tokens/batch-update
    description: Batch update token namespace, tags, and permissions
    args:
      - name: tokenIds
        type: array
        required: true
      - name: namespace
        type: string
        required: false
      - name: tags
        type: array
        required: false
      - name: tagsMode
        type: string
        required: false
        enum: [replace, add, remove, clear]
      - name: permissions
        type: array
        required: false
      - name: permissionsMode
        type: string
        required: false
        enum: [replace, merge]
    request:
      body:
        tokenIds: "{tokenIds}"
        namespace: "{namespace}"
        tags: "{tags}"
        tagsMode: "{tagsMode}"
        permissions: "{permissions}"
        permissionsMode: "{permissionsMode}"
    response:
      type: object
    risk:
      level: high
    idempotent: false
  get-policy:
