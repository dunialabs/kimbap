name: mypy-cli
version: 1.0.0
description: Python static type checker
adapter: command
command_spec:
  executable: mypy
  json_flag: "none"
auth:
  type: none
triggers:
  task_verbs: [check, typecheck]
  objects: [python types, type errors, mypy]
actions:
  check:
    command: "--"
    description: Run mypy type checking
    args:
      - name: path
        type: string
        required: true
        style: positional
    response:
      type: object
      text_filter:
        strip_lines_matching: ["^Success"]
        max_lines: 50
    risk:
      level: low
