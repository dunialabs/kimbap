name: whatsapp
version: 2.0.0
description: WhatsApp Cloud API integration for direct message delivery
base_url: https://graph.facebook.com
auth:
  type: bearer
  credential_ref: whatsapp.token
triggers:
  task_verbs: [send, deliver, notify]
  objects: [whatsapp messages, recipients]
  instead_of:
    - managing unofficial web-session automations
  exclusions:
    - non-WhatsApp channels
gotchas:
  - symptom: API returns 401/403 for all message requests
    likely_cause: Access token is missing, expired, or lacks WhatsApp permissions
    recovery: Rotate whatsapp.token and verify app permissions for Cloud API usage
    severity: high
  - symptom: API returns recipient or phone-number-id errors
    likely_cause: Invalid phone_number_id, destination format, or unapproved messaging context
    recovery: Validate phone_number_id and recipient format according to Cloud API constraints
    severity: high
recipes:
  - name: Send direct text message
    description: Deliver one WhatsApp text message through Cloud API
    steps:
      - Provide phone_number_id and recipient number in international format
      - Call send-text with the final message body
actions:
  send-text:
    method: POST
    path: /v22.0/{phone_number_id}/messages
    description: Send a text message via WhatsApp Cloud API
    idempotent: false
    args:
      - name: phone_number_id
        type: string
        required: true
      - name: to
        type: string
        required: true
      - name: text
        type: string
        required: true
      - name: preview_url
        type: boolean
        required: false
    request:
      body:
        messaging_product: whatsapp
        recipient_type: individual
        to: "{to}"
        type: text
        text:
          body: "{text}"
          preview_url: "{preview_url}"
    response:
      type: object
    risk:
      level: medium
