name: financial-datasets
version: 1.0.0
description: Financial Datasets API for stock prices, financial statements, and company news
base_url: https://api.financialdatasets.ai
auth:
  type: bearer
  credential_ref: financial-datasets.api_key
triggers:
  task_verbs: [get, fetch, search, check]
  objects: [stock prices, financials, company data, earnings]
  instead_of:
    - calling financial dataset APIs directly with unnormalized ticker/period inputs
  exclusions:
    - unrelated actions outside equity and company financial data retrieval
gotchas:
  - symptom: No data returned for known symbols
    likely_cause: Ticker submitted in lowercase instead of expected uppercase
    recovery: Normalize ticker symbols to uppercase before requests
    severity: common
  - symptom: Historical statements have missing years/quarters
    likely_cause: Data gaps for non-public, recently listed, or thinly covered companies
    recovery: Handle sparse histories gracefully and fallback to available periods
    severity: medium
  - symptom: Financials endpoint returns limited or empty period results
    likely_cause: Requested period (annual/quarterly/ttm) not available for that company
    recovery: Retry with alternate supported periods for the same ticker
    severity: medium
  - symptom: Expected universe of tickers is unavailable
    likely_cause: Free-tier plan limits coverage
    recovery: Check plan limits and upgrade if broader coverage is required
    severity: low
recipes:
  - name: Company financial research workflow
    description: Resolve company identity, inspect statements, and fetch latest market snapshot
    steps:
      - Search company by name to find canonical ticker
      - Get income statements for that ticker using an available period
      - Get current stock price snapshot for the same ticker
actions:
  get-stock-price:
    method: GET
    path: /prices/snapshot/
    description: Get the latest stock price snapshot for a ticker
    args:
      - name: ticker
        type: string
        required: true
    request:
      query:
        ticker: "{ticker}"
    response:
      type: object
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 200
      retry_on: [429, 500, 502, 503]
  get-income-statements:
    method: GET
    path: /financials/income-statements/
    description: Get income statements for a company
    args:
      - name: ticker
        type: string
        required: true
      - name: period
        type: string
        required: false
        default: "annual"
        enum: [annual, quarterly, ttm]
      - name: limit
        type: integer
        required: false
        default: 5
    request:
      query:
        ticker: "{ticker}"
        period: "{period}"
        limit: "{limit}"
    response:
      extract: income_statements
      type: array
    risk:
      level: low
  get-balance-sheets:
    method: GET
    path: /financials/balance-sheets/
    description: Get balance sheets for a company
    args:
      - name: ticker
        type: string
        required: true
      - name: period
        type: string
        required: false
        default: "annual"
        enum: [annual, quarterly]
      - name: limit
        type: integer
        required: false
        default: 5
    request:
      query:
        ticker: "{ticker}"
        period: "{period}"
        limit: "{limit}"
    response:
      extract: balance_sheets
      type: array
    risk:
      level: low
  get-cash-flow-statements:
    method: GET
    path: /financials/cash-flow-statements/
    description: Get cash flow statements for a company
    args:
      - name: ticker
        type: string
        required: true
      - name: period
        type: string
        required: false
        default: "annual"
        enum: [annual, quarterly]
      - name: limit
        type: integer
        required: false
        default: 5
    request:
      query:
        ticker: "{ticker}"
        period: "{period}"
        limit: "{limit}"
    response:
      extract: cash_flow_statements
      type: array
    risk:
      level: low
  search-company:
    method: GET
    path: /companies/search/
    description: Search for a company by name or keyword
    args:
      - name: query
        type: string
        required: true
    request:
      query:
        query: "{query}"
    response:
      extract: companies
      type: array
      filter:
        select:
          ticker: ticker
          name: name
          exchange: exchange
          currency: currency
        max_items: 10
        drop_nulls: true
    risk:
      level: low
  get-company-news:
    method: GET
    path: /news/
    description: Get recent news articles for a company
    args:
      - name: ticker
        type: string
        required: true
      - name: start_date
        type: string
        required: false
      - name: end_date
        type: string
        required: false
      - name: limit
        type: integer
        required: false
        default: 20
    request:
      query:
        ticker: "{ticker}"
        start_date: "{start_date}"
        end_date: "{end_date}"
        limit: "{limit}"
    response:
      extract: news
      type: array
      filter:
        select:
          title: title
          url: url
          source: source
          date: date
        max_items: 10
        drop_nulls: true
    risk:
      level: low
