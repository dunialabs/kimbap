name: open-meteo
version: 1.0.0
description: Open-Meteo API for weather forecasts and current conditions
base_url: https://api.open-meteo.com
auth:
  type: none
triggers:
  task_verbs: [get, fetch, check, forecast]
  objects: [weather, temperature, forecast, conditions]
  instead_of:
    - calling Open-Meteo APIs directly with handcrafted coordinates and params
  exclusions:
    - unrelated actions outside weather and geocoding workflows
gotchas:
  - symptom: Forecast calls fail when passing city names directly
    likely_cause: latitude and longitude require decimal degree numbers, not names
    recovery: Use open-meteo-geocoding first and pass returned lat/lon to forecast endpoints
    severity: common
  - symptom: Missing current metrics in response
    likely_cause: Invalid variable names in comma-separated current parameter are silently ignored
    recovery: Use only supported variable names and verify response fields
    severity: medium
  - symptom: weather_code value is hard to interpret
    likely_cause: Open-Meteo uses WMO weather codes rather than plain-language text
    recovery: Map weather_code values to WMO descriptions before presenting results
    severity: low
recipes:
  - name: Weather for city
    description: Resolve a place name to coordinates and fetch the forecast for that point
    steps:
      - Geocode the city or address to get latitude and longitude
      - Call get-forecast with the resolved coordinates and desired variables
      - Translate weather_code values to human-readable conditions if needed
actions:
  get-forecast:
    method: GET
    path: /v1/forecast
    description: Get weather forecast for a location
    aliases:
      - weather
    args:
      - name: latitude
        type: number
        required: true
      - name: longitude
        type: number
        required: true
      - name: current
        type: string
        required: false
        default: "temperature_2m,wind_speed_10m,weather_code"
      - name: hourly
        type: string
        required: false
      - name: daily
        type: string
        required: false
      - name: forecast_days
        type: integer
        required: false
        default: 7
      - name: timezone
        type: string
        required: false
        default: "auto"
    request:
      query:
        latitude: "{latitude}"
        longitude: "{longitude}"
        current: "{current}"
        hourly: "{hourly}"
        daily: "{daily}"
        forecast_days: "{forecast_days}"
        timezone: "{timezone}"
    response:
      type: object
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 200
      retry_on: [429, 500, 502, 503]
