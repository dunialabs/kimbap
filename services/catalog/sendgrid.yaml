name: sendgrid
version: 1.0.0
description: SendGrid API for sending transactional emails and retrieving stats
base_url: https://api.sendgrid.com/v3
auth:
  type: bearer
  credential_ref: sendgrid.api_key
triggers:
  task_verbs: [send, deliver, report, check]
  objects: [emails, stats, templates]
  instead_of:
    - calling SendGrid APIs directly with raw tokens
  exclusions:
    - unrelated actions outside email delivery and reporting
gotchas:
  - symptom: send-email returns 403 forbidden for valid payload
    likely_cause: from address is not a verified sender identity in SendGrid
    recovery: Verify sender domain/address in SendGrid and use that address for from
    severity: high
  - symptom: Large recipient batch fails or is partially accepted
    likely_cause: personalizations supports up to 1000 recipients per send call
    recovery: Split recipients into batches under the 1000-recipient limit
    severity: medium
  - symptom: Recipient rendering differs across email clients
    likely_cause: Only one body format was set (text or html)
    recovery: Provide both text_body and HTML body for better client compatibility
    severity: medium
  - symptom: get-stats returns 400 for date filters
    likely_cause: start_date is not formatted as YYYY-MM-DD
    recovery: Pass start_date using strict YYYY-MM-DD format
    severity: common
recipes:
  - name: Transactional send and verification
    description: Send a transactional email and verify delivery metrics after sending
    steps:
      - Send email with to, verified from, subject, and text body
      - Optionally include HTML body for richer client rendering
      - Query stats with a valid start_date to confirm activity
actions:
  send-email:
    method: POST
    path: /mail/send
    description: Send a transactional email
    warnings:
      - This sends a real email to the specified recipient
    args:
      - name: to
        type: string
        required: true
      - name: from_email
        type: string
        required: true
      - name: subject
        type: string
        required: true
      - name: text_body
        type: string
        required: true
    request:
      body:
        personalizations:
          - to:
              - email: "{to}"
        from:
          email: "{from_email}"
        subject: "{subject}"
        content:
          - type: "text/plain"
            value: "{text_body}"
    response:
      type: object
    risk:
      level: high
  get-stats:
    method: GET
    path: /stats
    description: Retrieve email sending statistics
    args:
      - name: start_date
        type: string
        required: true
      - name: end_date
        type: string
        required: false
      - name: aggregated_by
        type: string
        required: false
        enum: [day, week, month]
    request:
      query:
        start_date: "{start_date}"
        end_date: "{end_date}"
        aggregated_by: "{aggregated_by}"
    response:
      type: array
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 200
      retry_on: [429, 500, 502, 503]
  list-templates:
    method: GET
    path: /templates
    description: List dynamic email templates
    args:
      - name: page_size
        type: integer
        required: false
        default: 10
    request:
      query:
        generations: "dynamic"
        page_size: "{page_size}"
    response:
      extract: result
      type: array
    risk:
      level: low
