name: aws-cli
version: 1.0.0
description: AWS CLI for cloud infrastructure management
adapter: command
command_spec:
  executable: aws
  json_flag: "--output json"
  env_passthrough: ["AWS_*"]
auth:
  type: none
triggers:
  task_verbs: [list, inspect, manage]
  objects: [instances, functions, buckets, stacks]
  instead_of:
    - running aws commands directly without output filtering
  exclusions:
    - non-AWS cloud providers
actions:
  sts-identity:
    command: "sts get-caller-identity"
    description: Get current AWS identity
    idempotent: true
    response:
      type: object
      filter:
        select:
          account: Account
          arn: Arn
          user_id: UserId
    risk:
      level: low
  ec2-instances:
    command: "ec2 describe-instances"
    description: List EC2 instances
    idempotent: true
    response:
      type: object
    risk:
      level: low
  s3-ls:
    command: "s3 ls"
    description: List S3 buckets or objects
    json_flag: "none"
    args:
      - name: path
        type: string
        required: false
        style: positional
    idempotent: true
    response:
      type: object
      text_filter:
        max_lines: 50
    risk:
      level: low
  lambda-list:
    command: "lambda list-functions"
    description: List Lambda functions
    idempotent: true
    response:
      type: object
    risk:
      level: low
  logs-events:
    command: "logs get-log-events"
    description: Get CloudWatch log events
    args:
      - name: log_group_name
        type: string
        required: true
      - name: log_stream_name
        type: string
        required: true
    idempotent: true
    response:
      type: object
    risk:
      level: low
  cloudformation-stacks:
    command: "cloudformation describe-stacks"
    description: Describe CloudFormation stacks
    idempotent: true
    response:
      type: object
    risk:
      level: low
