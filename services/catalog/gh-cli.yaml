name: gh-cli
version: 1.0.0
description: GitHub CLI for repository and PR management
adapter: command
command_spec:
  executable: gh
  json_flag: "none"
  env_passthrough: ["GH_TOKEN", "GITHUB_TOKEN"]
auth:
  type: none
triggers:
  task_verbs: [list, inspect, create, manage]
  objects: [pull requests, issues, runs, repos]
  instead_of:
    - running gh commands directly without output filtering
  exclusions:
    - non-GitHub source control platforms
actions:
  pr-list:
    command: "pr list --json number,title,state,author,url"
    description: List pull requests as JSON
    args:
      - name: owner
        type: string
        required: false
        style: meta
      - name: repo
        type: string
        required: false
        style: repo-flag
      - name: state
        type: string
        required: false
        enum: [open, closed, merged, all]
    idempotent: true
    response:
      type: array
      compact:
        header: "Pull Requests:"
        item: "  #{{.number}} {{.title}} [{{.state}}] by {{.author.login}}"
        footer: "{{.Count}} PRs"
    risk:
      level: low
  pr-view:
    command: "pr view"
    description: View a specific pull request
    args:
      - name: owner
        type: string
        required: false
        style: meta
      - name: repo
        type: string
        required: false
        style: repo-flag
      - name: number
        type: integer
        required: true
        style: positional
      - name: json
        type: string
        required: false
        default: "number,title,state,body,reviews"
    idempotent: true
    response:
      type: object
    risk:
      level: low
  pr-checks:
    command: "pr checks"
    description: View PR check statuses
    args:
      - name: owner
        type: string
        required: false
        style: meta
      - name: repo
        type: string
        required: false
        style: repo-flag
      - name: number
        type: integer
        required: true
        style: positional
    idempotent: true
    response:
      type: object
      text_filter:
        max_lines: 30
    risk:
      level: low
  issue-list:
    command: "issue list --json number,title,state,labels,assignees"
    description: List issues as JSON
    args:
      - name: owner
        type: string
        required: false
        style: meta
      - name: repo
        type: string
        required: false
        style: repo-flag
    idempotent: true
    response:
      type: array
      compact:
        header: "Issues:"
        item: "  #{{.number}} {{.title}} [{{.state}}]"
        footer: "{{.Count}} issues"
    risk:
      level: low
  run-list:
    command: "run list --json databaseId,displayTitle,status,conclusion"
    description: List workflow runs as JSON
    args:
      - name: owner
        type: string
        required: false
        style: meta
      - name: repo
        type: string
        required: false
        style: repo-flag
    idempotent: true
    response:
      type: array
      compact:
        header: "Workflow Runs:"
        item: "  {{.displayTitle}} [{{.status}}/{{.conclusion}}]"
        footer: "{{.Count}} runs"
    risk:
      level: low
  repo-view:
    command: "repo view --json name,description,url,stargazerCount"
    description: View repository details
    args:
      - name: owner
        type: string
        required: false
        style: meta
      - name: repo
        type: string
        required: true
        style: repo-positional
    idempotent: true
    response:
      type: object
    risk:
      level: low
