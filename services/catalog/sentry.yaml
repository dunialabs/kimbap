name: sentry
version: 1.0.0
description: Sentry API for error tracking, issue management, and event monitoring
base_url: https://sentry.io/api/0
auth:
  type: bearer
  credential_ref: sentry.token
triggers:
  task_verbs: [list, inspect, resolve, assign, triage]
  objects: [issues, errors, events, projects]
  instead_of:
    - calling Sentry APIs directly with raw tokens
  exclusions:
    - unrelated actions outside Sentry issue and event operations
gotchas:
  - symptom: list-issues/get-issue returns not found for known project paths
    likely_cause: organization_slug and project_slug are URL slugs, not numeric IDs
    recovery: Copy slugs from the Sentry URL and use those exact slug values
    severity: common
  - symptom: update-issue rejects status changes with 400
    likely_cause: Unsupported status value passed
    recovery: Use only resolved, ignored, or unresolved
    severity: medium
  - symptom: list-issues returns overwhelming result sets
    likely_cause: Query filter was omitted on high-volume projects
    recovery: Use query parameter such as is:unresolved to narrow results
    severity: medium
  - symptom: Issue assignment update fails unexpectedly
    likely_cause: assigned_to expects username string rather than user ID
    recovery: Pass a valid Sentry username in assigned_to
    severity: medium
recipes:
  - name: Unresolved issue triage
    description: Pull unresolved issues, inspect details, and update status during triage
    steps:
      - List issues with query set to is:unresolved
      - Get a target issue for full details and context
      - Update issue status or assignee to reflect triage decision
actions:
  list-issues:
    method: GET
    path: /projects/{organization_slug}/{project_slug}/issues/
    description: List issues for a project with optional search query
    args:
      - name: organization_slug
        type: string
        required: true
      - name: project_slug
        type: string
        required: true
      - name: query
        type: string
        required: false
      - name: limit
        type: integer
        required: false
        default: 25
    request:
      path_params:
        organization_slug: "{organization_slug}"
        project_slug: "{project_slug}"
      query:
        query: "{query}"
        limit: "{limit}"
    response:
      type: array
      filter:
        select:
          id: id
          shortId: shortId
          title: title
          status: status
          level: level
          count: count
          userCount: userCount
          lastSeen: lastSeen
          permalink: permalink
        max_items: 25
        drop_nulls: true
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 200
      retry_on: [429, 500, 502, 503]
  get-issue:
    method: GET
    path: /issues/{issue_id}/
    description: Get details of a specific issue
    args:
      - name: issue_id
        type: string
        required: true
    request:
      path_params:
        issue_id: "{issue_id}"
    response:
      type: object
      filter:
        select:
          id: id
          shortId: shortId
          title: title
          status: status
          level: level
          culprit: culprit
          firstSeen: firstSeen
          lastSeen: lastSeen
          permalink: permalink
        drop_nulls: true
    risk:
      level: low
  update-issue:
    method: PUT
    path: /issues/{issue_id}/
    description: Update an issue status or assignment
    args:
      - name: issue_id
        type: string
        required: true
      - name: status
        type: string
        required: true
        enum: [resolved, ignored, unresolved]
      - name: assigned_to
        type: string
        required: false
    request:
      path_params:
        issue_id: "{issue_id}"
      body:
        status: "{status}"
        assignedTo: "{assigned_to}"
    response:
      type: object
    risk:
      level: medium
  list-projects:
    method: GET
    path: /organizations/{organization_slug}/projects/
    description: List all projects in an organization
    args:
      - name: organization_slug
        type: string
        required: true
    request:
      path_params:
        organization_slug: "{organization_slug}"
    response:
      type: array
      filter:
        select:
          id: id
          slug: slug
          name: name
          platform: platform
          dateCreated: dateCreated
        max_items: 25
        drop_nulls: true
    risk:
      level: low
  list-events:
    method: GET
    path: /issues/{issue_id}/events/
    description: List events for a specific issue
    args:
      - name: issue_id
        type: string
        required: true
      - name: limit
        type: integer
        required: false
        default: 10
    request:
      path_params:
        issue_id: "{issue_id}"
      query:
        limit: "{limit}"
    response:
      type: array
      filter:
        select:
          eventID: eventID
          dateCreated: dateCreated
          message: message
        max_items: 10
        drop_nulls: true
    risk:
      level: low
