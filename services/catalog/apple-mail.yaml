name: apple-mail
version: 1.0.0
description: Apple Mail via AppleScript
adapter: applescript
target_app: Mail
auth:
  type: none
triggers:
  task_verbs: [list, read, search, draft, send]
  objects: [mailboxes, messages, emails, threads]
  instead_of:
    - manually triaging mailbox content or composing routine outbound mail
  exclusions:
    - bulk marketing sends and campaign management workflows
gotchas:
  - symptom: get-message returns a different email than expected
    likely_cause: Subject lines are often duplicated across threads and senders
    recovery: Use list-messages within a specific mailbox first, then match by subject plus sender/date context
    severity: high
  - symptom: send-message fails or message remains in Outbox
    likely_cause: Account is offline, missing selected outgoing account, or Mail is still syncing
    recovery: Confirm Mail account is online/defaulted correctly and retry after sync completes
    severity: common
  - symptom: list-messages misses recent emails
    likely_cause: Smart mailbox or server mailbox indexing has not refreshed yet
    recovery: Target a concrete mailbox name and retry with a short delay
    severity: medium
recipes:
  - name: Safe mailbox triage and reply send
    description: Find the right thread context before sending a response
    steps:
      - Run apple-mail.list-mailboxes and select the exact mailbox
      - Run apple-mail.list-messages with mailbox and limit to identify the target message context
      - Run apple-mail.send-message with validated recipient, subject, and body
actions:
  list-mailboxes:
    command: list-mailboxes
    description: List all mailboxes
    idempotent: true
    args: []
    response:
      type: array
    risk:
      level: low
  list-messages:
    command: list-messages
    description: List messages in a mailbox
    idempotent: true
    args:
      - name: mailbox
        type: string
        required: false
      - name: limit
        type: integer
        required: false
    response:
      type: array
    risk:
      level: low
  get-message:
    command: get-message
    description: Get full message details
    idempotent: true
    args:
      - name: subject
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  send-message:
    command: send-message
    description: Send an email message
    idempotent: false
    args:
      - name: to
        type: string
        required: true
      - name: subject
        type: string
        required: true
      - name: body
        type: string
        required: true
      - name: cc
        type: string
        required: false
      - name: bcc
        type: string
        required: false
    response:
      type: object
    risk:
      level: high
  search-messages:
    command: search-messages
    description: Search messages by keyword
    idempotent: true
    args:
      - name: query
        type: string
        required: true
    response:
      type: array
    risk:
      level: low
