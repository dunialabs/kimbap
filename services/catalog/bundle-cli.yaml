name: bundle-cli
version: 1.0.0
description: Ruby Bundler package manager
adapter: command
command_spec:
  executable: bundle
  json_flag: "none"
auth:
  type: none
triggers:
  task_verbs: [install, list]
  objects: [gems, ruby dependencies, bundler]
gotchas:
  - symptom: install fails with permission errors
    likely_cause: System Ruby requires sudo for gem installation
    recovery: Use a Ruby version manager or set bundle path to a user-writable directory
    severity: medium
actions:
  install:
    command: "install"
    description: Install gems from Gemfile
    response:
      type: object
      text_filter:
        strip_lines_matching: ["^Using ", "^Fetching"]
        keep_lines_matching: ["Installing", "Bundle complete", "ERROR"]
        max_lines: 20
    risk:
      level: medium
  list:
    command: "list"
    description: List installed gems
    idempotent: true
    response:
      type: object
      text_filter:
        max_lines: 50
    risk:
      level: low
