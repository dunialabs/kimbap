name: keynote
version: 1.0.0
description: Apple Keynote automation via AppleScript — presentation creation, slide editing, and export on macOS
adapter: applescript
target_app: Keynote
auth:
  type: none
triggers:
  task_verbs: [create, open, add, edit, export, present]
  objects: [presentations, slides, slide text, decks]
  instead_of:
    - manually building and exporting slide decks in Keynote UI
  exclusions:
    - pixel-perfect visual design review or animation timing fine-tuning
gotchas:
  - symptom: set-slide-text fails with invalid object or index errors
    likely_cause: slide_number or item_index does not exist for the selected slide layout
    recovery: Add/inspect slide first, then target valid slide_number and text item index
    severity: high
  - symptom: export-pdf writes no file or fails on path
    likely_cause: output_path is relative, points to unwritable directory, or parent folder is missing
    recovery: Use absolute POSIX output_path and ensure destination directory exists and is writable
    severity: medium
  - symptom: add-slide or edit actions affect an unexpected document
    likely_cause: Multiple presentations are open and automation uses the active/frontmost one
    recovery: Open the intended presentation immediately before edits and avoid relying on stale frontmost context
    severity: common
recipes:
  - name: Create deck and export to PDF
    description: Build a minimal presentation and produce a distributable PDF
    steps:
      - Run keynote.create-presentation and keynote.add-slide as needed
      - Run keynote.set-slide-text with validated slide_number/item_index values
      - Run keynote.export-pdf with an absolute output_path
actions:
  create-presentation:
    command: keynote-create-presentation
    description: Create a new Keynote presentation
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: medium
  open-presentation:
    command: keynote-open-presentation
    description: Open a Keynote presentation from a POSIX file path
    idempotent: false
    args:
      - name: path
        type: string
        required: true
    response:
      type: object
    risk:
      level: low
  add-slide:
    command: keynote-add-slide
    description: Add a new slide to the active presentation
    idempotent: false
    args:
      - name: layout
        type: string
        required: false
    response:
      type: object
    risk:
      level: medium
  set-slide-text:
    command: keynote-set-slide-text
    description: Set text on a text item in a specific slide
    idempotent: false
    args:
      - name: slide_number
        type: integer
        required: true
      - name: text
        type: string
        required: true
      - name: item_index
        type: integer
        required: false
        default: 1
    response:
      type: object
    risk:
      level: medium
  export-pdf:
    command: keynote-export-pdf
    description: Export the active presentation as a PDF file
    idempotent: false
    args:
      - name: output_path
        type: string
        required: true
    response:
      type: object
    risk:
      level: medium
  start-slideshow:
    command: keynote-start-slideshow
    description: Start a slideshow from the first slide
    idempotent: false
    args: []
    response:
      type: object
    risk:
      level: low
  close-presentation:
    command: keynote-close-presentation
    description: Close the active presentation
    idempotent: false
    args:
      - name: save
        type: boolean
        required: false
        default: false
    response:
      type: object
    risk:
      level: medium
