name: pip-cli
version: 1.0.0
description: Python package installer
adapter: command
command_spec:
  executable: pip
  json_flag: "none"
auth:
  type: none
triggers:
  task_verbs: [list, install]
  objects: [python packages, pip packages, dependencies]
gotchas:
  - symptom: install conflicts with existing packages
    likely_cause: Version constraint conflict or missing virtual environment
    recovery: Use a virtual environment to isolate dependencies before installing
    severity: medium
actions:
  list:
    command: "list --format json"
    description: List installed Python packages
    idempotent: true
    response:
      type: array
    risk:
      level: low
  install:
    command: "install"
    description: Install Python packages
    args:
      - name: package
        type: string
        required: true
        style: positional
    response:
      type: object
      text_filter:
        strip_lines_matching: ["^Collecting", "^Downloading", "^\\s+Using"]
        keep_lines_matching: ["Successfully", "ERROR", "already satisfied"]
        max_lines: 20
    risk:
      level: medium
