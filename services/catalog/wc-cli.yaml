name: wc-cli
version: 1.0.0
description: Word, line, and byte count
adapter: command
command_spec:
  executable: wc
  json_flag: "none"
auth:
  type: none
triggers:
  task_verbs: [count, measure]
  objects: [lines, words, bytes]
  instead_of:
    - running wc directly without output filtering
  exclusions:
    - content search or pattern matching
actions:
  count:
    command: "-l"
    description: Count lines in files
    args:
      - name: path
        type: string
        required: true
        style: positional
    idempotent: true
    response:
      type: object
      text_filter:
        strip_lines_matching: ["^\\s*$"]
    risk:
      level: low
