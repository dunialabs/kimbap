name: go-cli
version: 1.0.0
description: Go toolchain commands
adapter: command
command_spec:
  executable: go
  json_flag: "none"
auth:
  type: none
triggers:
  task_verbs: [test, build, vet]
  objects: [go packages, tests, builds]
actions:
  test:
    command: "test -json"
    description: Run Go tests with JSON output (NDJSON)
    args:
      - name: packages
        type: string
        required: false
        style: positional
      - name: verbose
        type: boolean
        required: false
        style: boolean
    response:
      type: object
    risk:
      level: low
  build:
    command: "build"
    description: Compile Go packages
    args:
      - name: packages
        type: string
        required: false
        style: positional
    response:
      type: object
      text_filter:
        max_lines: 30
    risk:
      level: low
  vet:
    command: "vet"
    description: Run Go vet
    args:
      - name: packages
        type: string
        required: false
        style: positional
    response:
      type: object
      text_filter:
        max_lines: 30
    risk:
      level: low
