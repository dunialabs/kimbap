name: cat-cli
version: 1.0.0
description: File content viewer
adapter: command
command_spec:
  executable: cat
  json_flag: "none"
auth:
  type: none
triggers:
  task_verbs: [read, view, display]
  objects: [file contents, text files]
  instead_of:
    - running cat directly without output limits
  exclusions:
    - binary file viewing
actions:
  read:
    command: "--"
    description: Display file contents
    args:
      - name: path
        type: string
        required: true
        style: positional
    idempotent: true
    response:
      type: object
      text_filter:
        max_lines: 200
    risk:
      level: low
