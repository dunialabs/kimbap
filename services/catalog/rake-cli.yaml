name: rake-cli
version: 1.0.0
description: Ruby build and test automation
adapter: command
command_spec:
  executable: rake
  json_flag: "none"
auth:
  type: none
triggers:
  task_verbs: [test, run, build]
  objects: [tasks, tests, builds]
actions:
  test:
    command: "test"
    description: Run Ruby minitest/test-unit tests
    response:
      type: object
      text_filter:
        keep_lines_matching: ["Failure", "Error", "\\d+ tests", "\\d+ assertions"]
        max_lines: 50
    risk:
      level: low
  run:
    command: "--"
    description: Run a specific rake task
    args:
      - name: task
        type: string
        required: true
        style: positional
    response:
      type: object
      text_filter:
        max_lines: 50
    risk:
      level: low
