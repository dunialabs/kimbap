name: exa
version: 1.0.0
description: Exa AI-powered search API for semantic web search and content retrieval
base_url: https://api.exa.ai
auth:
  type: bearer
  credential_ref: exa.api_key
triggers:
  task_verbs: [search, discover, find, research, retrieve]
  objects: [web pages, documents, URLs]
  instead_of:
    - calling Exa APIs directly with raw tokens and manual result stitching
  exclusions:
    - unrelated actions outside web research and content retrieval
gotchas:
  - symptom: Search relevance is poor for concept queries
    likely_cause: Keyword-style query used where neural search expects natural language intent
    recovery: Use natural language prompts for neural mode or switch to keyword mode for exact terms
    severity: medium
  - symptom: get-contents returns not found for provided IDs
    likely_cause: IDs are not Exa document IDs from prior search results
    recovery: Pass only ids returned by Exa search results
    severity: high
  - symptom: Fewer results returned than requested numResults
    likely_cause: Plan-level caps or service truncation limits
    recovery: Handle truncated results gracefully and paginate or narrow scope
    severity: low
recipes:
  - name: Research and deep-read workflow
    description: Search broadly, then fetch full content for top relevant documents
    steps:
      - Search the topic with a natural language query
      - Extract top result IDs from search response
      - Call get-contents with those IDs to retrieve detailed text
actions:
  search:
    method: POST
    path: /search
    description: Search the web using neural or keyword search
    args:
      - name: query
        type: string
        required: true
      - name: num_results
        type: integer
        required: false
        default: 10
      - name: use_autoprompt
        type: boolean
        required: false
      - name: search_type
        type: string
        required: false
        default: "auto"
        enum: [neural, keyword, auto]
    request:
      body:
        query: "{query}"
        numResults: "{num_results}"
        useAutoprompt: "{use_autoprompt}"
        type: "{search_type}"
    response:
      type: object
    risk:
      level: low
    retry:
      max_attempts: 3
      backoff_ms: 200
      retry_on: [429, 500, 502, 503]
  find-similar:
    method: POST
    path: /findSimilar
    description: Find web pages similar to a given URL
    args:
      - name: url
        type: string
        required: true
      - name: num_results
        type: integer
        required: false
        default: 10
    request:
      body:
        url: "{url}"
        numResults: "{num_results}"
    response:
      type: object
    risk:
      level: low
  get-contents:
    method: POST
    path: /contents
    description: Get full text contents for a list of document IDs
    args:
      - name: ids
        type: array
        required: true
      - name: include_text
        type: boolean
        required: false
        default: true
    request:
      body:
        ids: "{ids}"
        text: "{include_text}"
    response:
      type: object
    risk:
      level: low
