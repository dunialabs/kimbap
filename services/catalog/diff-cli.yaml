name: diff-cli
version: 1.0.0
description: File comparison utility
adapter: command
command_spec:
  executable: diff
  json_flag: "none"
  success_codes: [0, 1]
auth:
  type: none
triggers:
  task_verbs: [compare, diff]
  objects: [files, text differences]
  instead_of:
    - running diff directly without output filtering
  exclusions:
    - git-managed diffs
actions:
  compare:
    command: "-u"
    description: Unified diff between two files
    args:
      - name: file1
        type: string
        required: true
        style: positional
      - name: file2
        type: string
        required: true
        style: positional
    idempotent: true
    response:
      type: object
      text_filter:
        max_lines: 100
    risk:
      level: low
