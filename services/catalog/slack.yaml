name: slack
version: 1.0.0
description: Slack API integration for messaging and channel management
base_url: https://slack.com/api
auth:
  type: bearer
  credential_ref: slack.token
triggers:
  task_verbs: [post, send, reply, list, fetch, summarize]
  objects: [messages, channels, threads]
  instead_of:
    - sending Slack HTTP requests directly
  exclusions:
    - non-Slack communication tools
gotchas:
  - symptom: channel_not_found when posting
    likely_cause: Used channel name (#general) instead of canonical channel ID (C...)
    recovery: Resolve and pass channel ID from conversations.list before posting
    severity: medium
  - symptom: not_in_channel response on post/reply
    likely_cause: Bot/app user is not a member of the target channel
    recovery: Invite the app/bot to the channel or use a channel where it is already present
    severity: high
  - symptom: Reply lands as a new root message
    likely_cause: thread_ts does not match the parent message ts in that channel
    recovery: Fetch parent message ts from channel history and reuse exact thread_ts
    severity: medium
  - symptom: 429 or ratelimited errors
    likely_cause: Workspace/app method rate limits exceeded
    recovery: Respect Retry-After, queue retries with jittered backoff, and limit burst calls
    severity: high
  - symptom: Message formatting appears broken
    likely_cause: mrkdwn expectations differ from plain text and escaping rules were missed
    recovery: Use mrkdwn-safe formatting/escaping and validate mentions/links syntax
    severity: low
  - symptom: Private channels missing from list/history
    likely_cause: Missing private channel scopes or bot is not joined to private channel
    recovery: Add required scopes (e.g., groups:read/history where applicable) and join channel
    severity: high
recipes:
  - name: Post update in thread safely
    description: Send a channel update and keep follow-ups in a consistent thread
    steps:
      - Resolve target channel ID and verify bot membership
      - Post root summary message and capture returned ts
      - Send follow-up details with thread_ts set to the captured ts
actions:
  post-message:
    method: POST
    path: /chat.postMessage
    description: Post a message to a Slack channel or thread
    args:
      - name: channel
        type: string
        required: true
      - name: text
        type: string
        required: true
      - name: thread_ts
        type: string
        required: false
    request:
      body:
        channel: "{channel}"
        text: "{text}"
        thread_ts: "{thread_ts}"
    response:
      type: object
    risk:
      level: medium
  list-channels:
    method: GET
    path: /conversations.list
    description: List channels in the Slack workspace
    args:
      - name: limit
        type: integer
        required: false
        default: 100
      - name: types
        type: string
        required: false
        default: public_channel
    request:
      query:
        limit: "{limit}"
        types: "{types}"
    response:
      type: object
      filter:
        select:
          id: id
          name: name
          is_channel: is_channel
          is_private: is_private
          num_members: num_members
          topic_value: topic.value
        drop_nulls: true
    risk:
      level: low
  get-channel-history:
    method: GET
    path: /conversations.history
    description: Retrieve message history from a Slack channel
    args:
      - name: channel
        type: string
        required: true
      - name: limit
        type: integer
        required: false
        default: 100
    request:
      query:
        channel: "{channel}"
        limit: "{limit}"
    response:
      type: object
      filter:
        select:
          ts: ts
          text: text
          user: user
          type: type
          thread_ts: thread_ts
          reply_count: reply_count
        exclude:
          - blocks
          - attachments
          - reactions
        max_items: 30
        drop_nulls: true
    risk:
      level: low
